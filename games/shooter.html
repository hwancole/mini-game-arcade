<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-ko="🔫 탑다운 슈팅" data-en="🔫 Top-Down Shooter">🔫 탑다운 슈팅</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI','Malgun Gothic',sans-serif;background:#0d0d14;color:#eee;
    display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}
  .topbar{width:100%;max-width:960px;display:flex;justify-content:space-between;align-items:center;padding:10px 16px}
  .topbar a{color:#ff5f6d;text-decoration:none;font-weight:bold}
  h1{font-size:1.2rem}
  #wrap{position:relative}
  canvas{background:#1a1a24;border:2px solid #333;border-radius:8px;display:block;cursor:crosshair}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(8,8,14,.92);border-radius:8px;text-align:center;padding:20px;gap:14px}
  .overlay.hidden{display:none}
  .overlay h2{font-size:2rem;background:linear-gradient(90deg,#ff5f6d,#ffc371);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .btn{background:#ff5f6d;color:#fff;border:none;padding:12px 26px;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:bold;transition:.15s}
  .btn:hover{transform:scale(1.05);box-shadow:0 6px 20px -6px #ff5f6d}
  .btn.alt{background:#333;}
  .modes{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .mode{padding:14px 20px;border:2px solid #444;border-radius:10px;cursor:pointer;min-width:150px;transition:.15s}
  .mode:hover{border-color:#ff5f6d}
  .mode.sel{border-color:#ff5f6d;background:rgba(255,95,109,.15)}
  .mode h3{margin-bottom:6px}.mode p{font-size:.8rem;color:#9aa}
  .hint{color:#778;font-size:.85rem;line-height:1.6;max-width:420px}
  kbd{background:#222;border:1px solid #444;border-radius:4px;padding:1px 6px;font-size:.8rem}
</style>
<link rel="stylesheet" href="_arcade.css">
<script src="_i18n.js"></script>
</head>
<body>
<div class="topbar"><a href="../index.html">← 메인으로</a><h1 data-ko="🔫 탑다운 슈팅" data-en="🔫 Top-Down Shooter">🔫 탑다운 슈팅</h1><span id="modeLabel"></span></div>
<div id="wrap">
  <canvas id="cv" width="900" height="560"></canvas>

  <div class="overlay" id="startScreen">
    <h2 data-ko="탑다운 슈팅" data-en="Top-Down Shooter">탑다운 슈팅</h2>
    <p class="hint" data-ko="적이 떨어뜨리는 무기(🔵SMG·🟣샷건)와 체력·탄약을 주우세요! 적은 일반·빠른·거대 3종." data-en="Grab weapons (🔵SMG·🟣Shotgun), health & ammo dropped by enemies! 3 enemy types: grunt, runner, brute.">적이 떨어뜨리는 무기(🔵SMG·🟣샷건)와 체력·탄약을 주우세요! 적은 일반·빠른·거대 3종.</p>
    <div class="modes">
      <div class="mode sel" data-mode="deathmatch"><h3 data-ko="💀 데스매치" data-en="💀 Deathmatch">💀 데스매치</h3><p data-ko="적 4명을 모두 처치하면 승리" data-en="Eliminate all 4 enemies to win">적 4명을 모두 처치하면 승리</p></div>
      <div class="mode" data-mode="infinite"><h3 data-ko="♾️ 무한모드" data-en="♾️ Endless">♾️ 무한모드</h3><p data-ko="끝없이 몰려오는 적, 최고 킬 도전" data-en="Endless waves of enemies — chase the high kill count">끝없이 몰려오는 적, 최고 킬 도전</p></div>
    </div>
    <button class="btn" id="startBtn">게임 시작 ▶</button>
    <p class="hint">
      <span data-ko="🖥️ PC:" data-en="🖥️ PC:">🖥️ PC:</span> <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> <span data-ko="이동 · 마우스 조준 ·" data-en="move · mouse aim ·">이동 · 마우스 조준 ·</span>
      <kbd data-ko="좌클릭" data-en="Left-click">좌클릭</kbd> <span data-ko="발사 ·" data-en="fire ·">발사 ·</span> <kbd>R</kbd> <span data-ko="재장전 ·" data-en="reload ·">재장전 ·</span> <kbd>Shift</kbd> <span data-ko="달리기" data-en="sprint">달리기</span><br>
      <span data-ko="📱 모바일: 왼쪽" data-en="📱 Mobile: left">📱 모바일: 왼쪽</span> <b>D-패드</b> <span data-ko="이동 ·" data-en="move ·">이동 ·</span> <b data-ko="화면을 터치" data-en="touch the screen">화면을 터치</b><span data-ko="하면 그 방향으로 조준·자동발사 · 오른쪽 버튼 재장전/달리기" data-en=" to aim & auto-fire that direction · right buttons reload/sprint">하면 그 방향으로 조준·자동발사 · 오른쪽 버튼 재장전/달리기</span>
    </p>
  </div>

  <div class="overlay hidden" id="endScreen">
    <h2 id="endTitle">게임 오버</h2>
    <p class="hint" id="endStats"></p>
    <div style="display:flex;gap:12px">
      <button class="btn" id="restartBtn">🔄 재시작</button>
      <button class="btn alt" id="menuBtn">모드 선택</button>
      <a class="btn alt" href="../index.html">🏠 홈으로</a>
    </div>
  </div>

  <div class="overlay hidden" id="pauseScreen">
    <h2>일시정지</h2>
    <button class="btn" id="resumeBtn">계속하기</button>
  </div>
</div>

<script>
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;
const startScreen=document.getElementById('startScreen'), endScreen=document.getElementById('endScreen'),
      pauseScreen=document.getElementById('pauseScreen'), modeLabel=document.getElementById('modeLabel');

let mode='deathmatch';
document.querySelectorAll('.mode').forEach(m=>m.onclick=()=>{
  document.querySelectorAll('.mode').forEach(x=>x.classList.remove('sel'));
  m.classList.add('sel'); mode=m.dataset.mode;
});

// ---- Map walls ----
const walls=[
  {x:0,y:0,w:W,h:14},{x:0,y:H-14,w:W,h:14},{x:0,y:0,w:14,h:H},{x:W-14,y:0,w:14,h:H},
  {x:200,y:120,w:30,h:160},{x:670,y:120,w:30,h:160},
  {x:380,y:60,w:140,h:26},{x:380,y:474,w:140,h:26},
  {x:120,y:380,w:120,h:26},{x:660,y:380,w:120,h:26},
  {x:430,y:250,w:40,h:60},
];

let keys={}, mouse={x:W/2,y:H/2,down:false};
let player, enemies, bullets, particles, pickups;
let state='menu', kills=0, wave=0, lastTime=0, spawnTimer=0;
let shake=0, hurt=0;
function addShake(n){ shake=Math.min(16,shake+n); }

// ---- 사운드 (WebAudio, 사용자 제스처 후 활성화) ----
let actx=null;
function AC(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return actx; }
function tone(f,f2,dur,type,vol){ const a=AC(); if(!a)return; const o=a.createOscillator(),g=a.createGain();
  o.type=type||'square'; o.frequency.setValueAtTime(f,a.currentTime);
  if(f2)o.frequency.exponentialRampToValueAtTime(Math.max(20,f2),a.currentTime+dur);
  g.gain.setValueAtTime(vol||0.14,a.currentTime); g.gain.exponentialRampToValueAtTime(0.0008,a.currentTime+dur);
  o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+dur); }
function noise(dur,vol){ const a=AC(); if(!a)return; const n=a.sampleRate*dur|0; const buf=a.createBuffer(1,n,a.sampleRate);
  const d=buf.getChannelData(0); for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/n,2);
  const s=a.createBufferSource(); s.buffer=buf; const g=a.createGain(); g.gain.value=vol||0.18; s.connect(g); g.connect(a.destination); s.start(); }
function sfx(type){ switch(type){
  case 'pistol': tone(230,80,0.08,'square',0.12); noise(0.05,0.07); break;
  case 'smg': tone(320,150,0.05,'square',0.09); break;
  case 'shotgun': tone(150,45,0.16,'sawtooth',0.16); noise(0.15,0.18); break;
  case 'reload': tone(520,520,0.04,'square',0.08); setTimeout(()=>tone(360,360,0.05,'square',0.08),130); break;
  case 'hit': tone(880,560,0.05,'square',0.06); break;
  case 'death': tone(170,40,0.24,'sawtooth',0.15); noise(0.2,0.16); break;
  case 'pickup': tone(520,800,0.10,'triangle',0.12); break;
  case 'hurt': tone(120,45,0.18,'sawtooth',0.18); noise(0.1,0.12); break;
} }

// ---- 무기 (권총/SMG/샷건) ----
const WEAPONS={
  pistol:{name:['권총','Pistol'],mag:14,reserve:70,cool:11,dmg:15,pellets:1,spread:0.05,reload:65,bspeed:12,shake:2},
  smg:{name:['기관단총','SMG'],mag:30,reserve:150,cool:5,dmg:9,pellets:1,spread:0.10,reload:80,bspeed:13,shake:1.5},
  shotgun:{name:['샷건','Shotgun'],mag:6,reserve:30,cool:34,dmg:9,pellets:6,spread:0.34,reload:95,bspeed:11,shake:6},
};
// ---- 적 타입 (일반/快足/거대) ----
const ETYPES={
  grunt:{r:13,hp:30,speed:1.45,fireRate:62,dmg:8,color:'#ff7b7b',bspeed:6},
  runner:{r:10,hp:18,speed:2.6,fireRate:48,dmg:6,color:'#ffd35f',bspeed:7},
  brute:{r:19,hp:75,speed:0.9,fireRate:115,dmg:16,color:'#c46fff',bspeed:5},
};
function pickType(){ const w=wave||1, r=Math.random();
  if(mode==='deathmatch') return r<0.5?'grunt':r<0.8?'runner':'brute';
  if(w<2) return r<0.85?'grunt':'runner';
  if(w<4) return r<0.55?'grunt':r<0.85?'runner':'brute';
  return r<0.4?'grunt':r<0.72?'runner':'brute'; }

function rectCircle(rx,ry,rw,rh,cx,cy,cr){
  const nx=Math.max(rx,Math.min(cx,rx+rw)), ny=Math.max(ry,Math.min(cy,ry+rh));
  const dx=cx-nx, dy=cy-ny; return dx*dx+dy*dy < cr*cr;
}
function lineBlocked(x1,y1,x2,y2){
  const steps=Math.ceil(Math.hypot(x2-x1,y2-y1)/8);
  for(let i=0;i<=steps;i++){
    const t=i/steps, x=x1+(x2-x1)*t, y=y1+(y2-y1)*t;
    for(const w of walls) if(x>w.x&&x<w.x+w.w&&y>w.y&&y<w.y+w.h) return true;
  }
  return false;
}
function collideWalls(o){
  for(const w of walls){
    if(rectCircle(w.x,w.y,w.w,w.h,o.x,o.y,o.r)){
      const nx=Math.max(w.x,Math.min(o.x,w.x+w.w)), ny=Math.max(w.y,Math.min(o.y,w.y+w.h));
      let dx=o.x-nx, dy=o.y-ny, d=Math.hypot(dx,dy)||1;
      o.x=nx+dx/d*o.r; o.y=ny+dy/d*o.r;
    }
  }
  o.x=Math.max(o.r,Math.min(W-o.r,o.x)); o.y=Math.max(o.r,Math.min(H-o.r,o.y));
}

function spawnPoint(){
  let x,y,tries=0;
  do{ x=40+Math.random()*(W-80); y=40+Math.random()*(H-80); tries++; }
  while(tries<50 && (walls.some(w=>rectCircle(w.x,w.y,w.w,w.h,x,y,30)) || Math.hypot(x-player.x,y-player.y)<220));
  return {x,y};
}

function makeEnemy(typeKey){
  const p=spawnPoint(), tk=typeKey||pickType(), T=ETYPES[tk];
  return {x:p.x,y:p.y,type:tk,r:T.r,hp:T.hp,maxhp:T.hp,speed:T.speed+Math.random()*0.3,angle:0,cool:Math.random()*40,
          fireRate:T.fireRate+Math.random()*30,dmg:T.dmg,bspeed:T.bspeed,color:T.color,hitFlash:0,
          strafe:Math.random()<0.5?1:-1,strafeTimer:0,
          lastSeen:null,wander:{x:p.x,y:p.y},wanderTimer:0};
}

function startGame(){
  player={x:W/2,y:H-80,r:14,angle:0,speed:2.4,hp:100,maxhp:100,
          weapon:'pistol',ammo:WEAPONS.pistol.mag,reserve:WEAPONS.pistol.reserve,reloading:0,fireCool:0,muzzle:0};
  enemies=[]; bullets=[]; particles=[]; pickups=[];
  kills=0; wave=1; spawnTimer=0; shake=0; hurt=0;
  if(mode==='deathmatch'){ ['grunt','grunt','runner','brute'].forEach(tk=>enemies.push(makeEnemy(tk))); }
  else { for(let i=0;i<3;i++) enemies.push(makeEnemy('grunt')); }
  state='play'; AC();
  startScreen.classList.add('hidden'); endScreen.classList.add('hidden'); pauseScreen.classList.add('hidden');
  modeLabel.textContent = mode==='deathmatch'?t('💀 데스매치','💀 Deathmatch'):t('♾️ 무한모드','♾️ Endless');
  lastTime=performance.now();
}

function endGame(win){
  state='over';
  document.getElementById('endTitle').textContent = win?t('🏆 승리!','🏆 Victory!'):t('💀 게임 오버','💀 Game Over');
  const key='shooter_best_'+mode, prevBest=parseInt(localStorage.getItem(key)||'0');
  const isNew=kills>prevBest; if(isNew)localStorage.setItem(key,kills);
  const bestNow=Math.max(prevBest,kills);
  let stats = t(`처치한 적: <b>${kills}</b>`,`Enemies eliminated: <b>${kills}</b>`);
  if(mode==='infinite') stats += t(` · 웨이브: <b>${wave}</b>`,` · Wave: <b>${wave}</b>`);
  stats += t(`<br>🏆 최고 기록: <b>${bestNow}</b>킬${isNew?' 🎉 신기록!':''}`,`<br>🏆 Best: <b>${bestNow}</b> kills${isNew?' 🎉 New record!':''}`);
  stats += t(`<br><span style="font-size:.76rem;color:#667">기록은 이 기기에만 저장됩니다</span>`,`<br><span style="font-size:.76rem;color:#667">Records are saved on this device only</span>`);
  document.getElementById('endStats').innerHTML = stats;
  endScreen.classList.remove('hidden');
}

function shoot(){
  if(player.reloading>0 || player.fireCool>0) return;
  const Wp=WEAPONS[player.weapon];
  if(player.ammo<=0){ reload(); return; } // 탄창 비면 자동 재장전
  player.ammo--; player.fireCool=Wp.cool; player.muzzle=4;
  for(let i=0;i<Wp.pellets;i++){
    const ang=player.angle+(Math.random()-.5)*Wp.spread;
    bullets.push({x:player.x+Math.cos(ang)*18,y:player.y+Math.sin(ang)*18,
      vx:Math.cos(ang)*Wp.bspeed,vy:Math.sin(ang)*Wp.bspeed,r:3,from:'p',life:70,dmg:Wp.dmg});
  }
  player.x-=Math.cos(player.angle)*1.5; player.y-=Math.sin(player.angle)*1.5;
  addShake(Wp.shake); sfx(player.weapon);
}
function reload(){
  const Wp=WEAPONS[player.weapon];
  if(player.reloading>0||player.ammo===Wp.mag||player.reserve<=0) return;
  player.reloading=Wp.reload; sfx('reload');
}

// input
addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  if(e.key.toLowerCase()==='r') reload();
  if(e.key==='Escape'&&state==='play'){state='pause';pauseScreen.classList.remove('hidden');}
  else if(e.key==='Escape'&&state==='pause'){resume();}
  if([' ','w','a','s','d'].includes(e.key.toLowerCase()))e.preventDefault();
});
addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();
  mouse.x=(e.clientX-r.left)*(W/r.width); mouse.y=(e.clientY-r.top)*(H/r.height);});
cv.addEventListener('mousedown',e=>{if(e.button===0)mouse.down=true;});
addEventListener('mouseup',()=>mouse.down=false);

function resume(){state='play';pauseScreen.classList.add('hidden');lastTime=performance.now();}
document.getElementById('startBtn').onclick=startGame;
document.getElementById('restartBtn').onclick=startGame;
document.getElementById('resumeBtn').onclick=resume;
document.getElementById('menuBtn').onclick=()=>{state='menu';endScreen.classList.add('hidden');startScreen.classList.remove('hidden');};

function spark(x,y,color,n,spd){
  for(let i=0;i<n;i++){const a=Math.random()*7;particles.push({x,y,vx:Math.cos(a)*(Math.random()*spd),vy:Math.sin(a)*(Math.random()*spd),life:20+Math.random()*15,color,r:1+Math.random()*2});}
}

function update(dt){
  // player movement
  player.angle=Math.atan2(mouse.y-player.y,mouse.x-player.x);
  let sp=player.speed*(keys['shift']?1.6:1);
  let mx=0,my=0;
  if(keys['w'])my--; if(keys['s'])my++; if(keys['a'])mx--; if(keys['d'])mx++;
  if(mx||my){const l=Math.hypot(mx,my);player.x+=mx/l*sp;player.y+=my/l*sp;}
  collideWalls(player);
  if(player.fireCool>0)player.fireCool--;
  if(player.muzzle>0)player.muzzle--;
  if(player.reloading>0){player.reloading--; if(player.reloading===0){
    const need=WEAPONS[player.weapon].mag-player.ammo, take=Math.min(need,player.reserve);
    player.ammo+=take; player.reserve-=take;
  }}
  if(hurt>0)hurt--;
  if(mouse.down) shoot();

  // enemies AI
  for(const e of enemies){
    if(e.hitFlash>0)e.hitFlash--;
    const dist=Math.hypot(player.x-e.x,player.y-e.y);
    const sees=!lineBlocked(e.x,e.y,player.x,player.y);
    let tx,ty; // target to move toward
    if(sees){
      e.lastSeen={x:player.x,y:player.y};
      e.angle=Math.atan2(player.y-e.y,player.x-e.x);
      // maintain a comfortable engagement distance, strafe sideways
      e.strafeTimer--; if(e.strafeTimer<=0){e.strafe*=-1;e.strafeTimer=60+Math.random()*60;}
      let mvx=0,mvy=0;
      if(dist>200){mvx+=Math.cos(e.angle);mvy+=Math.sin(e.angle);}
      else if(dist<130){mvx-=Math.cos(e.angle);mvy-=Math.sin(e.angle);}
      // strafe perpendicular
      mvx+=Math.cos(e.angle+Math.PI/2)*e.strafe*0.7;
      mvy+=Math.sin(e.angle+Math.PI/2)*e.strafe*0.7;
      tx=mvx;ty=mvy;
    } else if(e.lastSeen){
      // move to last known position
      const a=Math.atan2(e.lastSeen.y-e.y,e.lastSeen.x-e.x);
      e.angle=a; tx=Math.cos(a);ty=Math.sin(a);
      if(Math.hypot(e.lastSeen.x-e.x,e.lastSeen.y-e.y)<24)e.lastSeen=null;
    } else {
      // patrol to a random reachable point
      e.wanderTimer--;
      if(e.wanderTimer<=0||Math.hypot(e.wander.x-e.x,e.wander.y-e.y)<24){
        e.wander=spawnPoint();e.wanderTimer=180;
      }
      const a=Math.atan2(e.wander.y-e.y,e.wander.x-e.x);
      e.angle=a; tx=Math.cos(a)*0.6;ty=Math.sin(a)*0.6;
    }
    // separation from other enemies
    for(const o of enemies){ if(o===e)continue;
      const dx=e.x-o.x,dy=e.y-o.y,d=Math.hypot(dx,dy);
      if(d>0&&d<e.r+o.r+6){tx+=dx/d*1.2;ty+=dy/d*1.2;}
    }
    const len=Math.hypot(tx,ty)||1;
    e.x+=tx/len*e.speed; e.y+=ty/len*e.speed;
    collideWalls(e);
    e.cool--;
    if(sees && e.cool<=0 && dist<440){
      e.cool=e.fireRate;
      const a=e.angle+(Math.random()-.5)*0.18;
      bullets.push({x:e.x+Math.cos(a)*16,y:e.y+Math.sin(a)*16,vx:Math.cos(a)*e.bspeed,vy:Math.sin(a)*e.bspeed,r:3,from:'e',life:120,dmg:e.dmg});
    }
  }

  // bullets
  for(const b of bullets){
    b.x+=b.vx; b.y+=b.vy; b.life--;
    for(const w of walls) if(b.x>w.x&&b.x<w.x+w.w&&b.y>w.y&&b.y<w.y+w.h){b.life=0;spark(b.x,b.y,'#888',4,3);}
    if(b.from==='p'){
      for(const e of enemies){
        if(Math.hypot(b.x-e.x,b.y-e.y)<e.r+b.r){ e.hp-=b.dmg; e.hitFlash=4; b.life=0; spark(b.x,b.y,'#ff9b9b',6,4); sfx('hit'); }
      }
    } else {
      if(Math.hypot(b.x-player.x,b.y-player.y)<player.r+b.r){ player.hp-=b.dmg; b.life=0; spark(b.x,b.y,'#ffd27b',6,4); hurt=14; addShake(3); sfx('hurt'); }
    }
  }
  bullets=bullets.filter(b=>b.life>0);

  // enemy death
  for(let i=enemies.length-1;i>=0;i--){
    if(enemies[i].hp<=0){
      const e=enemies[i];
      spark(e.x,e.y,e.color,e.type==='brute'?34:24,7); addShake(e.type==='brute'?6:3); sfx('death');
      const r=Math.random(); let drop=null;
      if(e.type==='brute') drop = r<0.4?'shotgun':r<0.7?'smg':r<0.9?'hp':'ammo';
      else drop = r<0.28?'hp':r<0.52?'ammo':r<0.62?'smg':r<0.68?'shotgun':null;
      if(drop) pickups.push({x:e.x,y:e.y,r:10,type:drop,t:0});
      enemies.splice(i,1); kills++;
    }
  }

  // pickups
  for(let i=pickups.length-1;i>=0;i--){
    const p=pickups[i]; p.t++;
    if(Math.hypot(p.x-player.x,p.y-player.y)<player.r+p.r){
      if(p.type==='hp')player.hp=Math.min(player.maxhp,player.hp+25);
      else if(p.type==='ammo')player.reserve+=Math.round(WEAPONS[player.weapon].reserve*0.4)+10;
      else { player.weapon=p.type; const Wp=WEAPONS[p.type]; player.ammo=Wp.mag; player.reserve=Wp.reserve; player.reloading=0; }
      sfx('pickup'); spark(p.x,p.y,'#fff',12,4); pickups.splice(i,1);
    }
  }

  // particles
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vx*=.92;p.vy*=.92;p.life--;}
  particles=particles.filter(p=>p.life>0);

  // spawn / win logic
  if(mode==='deathmatch'){
    if(enemies.length===0) endGame(true);
  } else {
    spawnTimer--;
    const target=Math.min(3+Math.floor(kills/4),9);
    if(enemies.length<target && spawnTimer<=0){ enemies.push(makeEnemy()); spawnTimer=90; }
    wave=Math.floor(kills/4)+1;
  }
  if(player.hp<=0){player.hp=0; endGame(false);}
}

const PICK={hp:{c:'#5fffbc',l:'+'},ammo:{c:'#ffc371',l:'A'},smg:{c:'#5fd0ff',l:'S'},shotgun:{c:'#ff5fd0',l:'G'}};
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#1a1a24'; ctx.fillRect(0,0,W,H); // 같은 색이라 흔들림 시 가장자리 빈틈 안 보임
  ctx.save();
  if(shake>0.3){ ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake); shake*=0.86; } else shake=0;
  // floor grid
  ctx.strokeStyle='rgba(255,255,255,.03)';
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  // walls
  for(const w of walls){
    ctx.fillStyle='#2e2e3e'; ctx.fillRect(w.x,w.y,w.w,w.h);
    ctx.strokeStyle='#454560'; ctx.strokeRect(w.x+.5,w.y+.5,w.w-1,w.h-1);
  }
  // pickups
  for(const p of pickups){
    const pk=PICK[p.type]||PICK.ammo;
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.t*0.04);
    ctx.shadowColor=pk.c;ctx.shadowBlur=8;ctx.fillStyle=pk.c;ctx.fillRect(-p.r,-p.r,p.r*2,p.r*2);ctx.shadowBlur=0;
    ctx.fillStyle='#0d0d14';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(pk.l,0,1);ctx.restore();
  }
  // particles
  for(const p of particles){ctx.globalAlpha=Math.min(1,p.life/20);ctx.fillStyle=p.color;ctx.fillRect(p.x-p.r,p.y-p.r,p.r*2,p.r*2);}
  ctx.globalAlpha=1;
  // bullets
  for(const b of bullets){
    ctx.fillStyle=b.from==='p'?'#fff07b':'#ff9b6b';
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,7);ctx.fill();
  }
  // enemies
  for(const e of enemies) drawActor(e,e.hitFlash>0?'#fff':e.color,true);
  // player
  drawActor(player,'#5f9fff',false);
  if(player.muzzle>0){
    ctx.fillStyle='rgba(255,240,120,.9)';
    const ms=player.weapon==='shotgun'?10:6;
    ctx.beginPath();ctx.arc(player.x+Math.cos(player.angle)*22,player.y+Math.sin(player.angle)*22,ms,0,7);ctx.fill();
  }
  ctx.restore();
  // 피격 빨강 비네트
  if(hurt>0){ const a=Math.min(0.5,hurt/14*0.5);
    const g=ctx.createRadialGradient(W/2,H/2,H*0.28,W/2,H/2,H*0.78);
    g.addColorStop(0,'rgba(255,0,0,0)');g.addColorStop(1,`rgba(255,30,30,${a})`);
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H); }
  drawHUD();
}
function drawActor(a,color,isEnemy){
  ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.angle);
  // body
  ctx.fillStyle=color;ctx.beginPath();ctx.arc(0,0,a.r,0,7);ctx.fill();
  // gun
  ctx.fillStyle='#222';ctx.fillRect(a.r-2,-3,16,6);
  ctx.restore();
  // hp bar for enemies
  if(isEnemy){
    const bw=a.r*2+4;
    ctx.fillStyle='#000';ctx.fillRect(a.x-bw/2,a.y-a.r-10,bw,4);
    ctx.fillStyle='#ff5f6d';ctx.fillRect(a.x-bw/2,a.y-a.r-10,bw*Math.max(0,a.hp/a.maxhp),4);
  }
}
function drawHUD(){
  // health
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(14,H-46,210,32);
  ctx.fillStyle='#333';ctx.fillRect(20,H-40,180,12);
  ctx.fillStyle='#5fffbc';ctx.fillRect(20,H-40,180*(player.hp/player.maxhp),12);
  ctx.fillStyle='#fff';ctx.font='12px sans-serif';ctx.textAlign='left';ctx.textBaseline='alphabetic';
  ctx.fillText('HP '+Math.ceil(player.hp),20,H-44);
  // weapon name + ammo
  const Wp=WEAPONS[player.weapon];
  ctx.font='bold 13px sans-serif';ctx.textAlign='right';ctx.fillStyle='#ffd35f';
  ctx.fillText('🔫 '+t(Wp.name[0],Wp.name[1]),W-20,H-46);
  ctx.font='bold 20px sans-serif';
  ctx.fillStyle=player.reloading>0?'#ffc371':'#fff';
  const ammoTxt=player.reloading>0?t('재장전...','Reloading...'):`${player.ammo} / ${player.reserve}`;
  ctx.fillText(ammoTxt,W-20,H-22);
  if(player.reloading>0){
    ctx.fillStyle='#333';ctx.fillRect(W-150,H-18,130,5);
    ctx.fillStyle='#ffc371';ctx.fillRect(W-150,H-18,130*(1-player.reloading/90),5);
  }
  // kills/wave
  ctx.textAlign='left';ctx.font='bold 16px sans-serif';ctx.fillStyle='#fff';
  ctx.fillText('💀 '+kills,20,28);
  if(mode==='infinite')ctx.fillText(t('🌊 웨이브 ','🌊 Wave ')+wave,20,50);
  else ctx.fillText(t('남은 적: ','Enemies left: ')+enemies.length,20,50);
}

function loop(t){
  const dt=Math.min(2,(t-lastTime)/16.67);lastTime=t;
  if(state==='play') update(dt);
  if(state==='play'||state==='pause'||state==='over') draw();
  requestAnimationFrame(loop);
}
// idle bg draw
ctx.fillStyle='#1a1a24';ctx.fillRect(0,0,W,H);
requestAnimationFrame(loop);
</script>
<script src="_controls.js"></script>
<script>
TC.make({
  landscape:true,
  dpad:{keys:{up:'w',down:'s',left:'a',right:'d'}},
  right:[{label:'🔄',sub:t('재장전','Reload'),key:'r'},{label:'🏃',sub:t('달리기','Sprint'),key:'Shift'}]
});
// 캔버스 터치 = 조준 + 사격
(function(){
  function aim(t){const r=cv.getBoundingClientRect();mouse.x=(t.clientX-r.left)*(W/r.width);mouse.y=(t.clientY-r.top)*(H/r.height);}
  cv.addEventListener('touchstart',e=>{e.preventDefault();aim(e.touches[0]);mouse.down=true;},{passive:false});
  cv.addEventListener('touchmove',e=>{e.preventDefault();aim(e.touches[0]);},{passive:false});
  cv.addEventListener('touchend',e=>{e.preventDefault();mouse.down=false;},{passive:false});
  cv.addEventListener('touchcancel',()=>{mouse.down=false;});
})();
</script>
