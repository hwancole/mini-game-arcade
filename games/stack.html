<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏗️ 블록 쌓기</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI','Malgun Gothic',sans-serif;background:#0a0e1a;color:#eee;
    display:flex;flex-direction:column;align-items:center;min-height:100vh;user-select:none}
  .topbar{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:10px 16px}
  .topbar a{color:#5fd0ff;text-decoration:none;font-weight:bold}
  #wrap{position:relative}
  canvas{background:linear-gradient(180deg,#0a0e1a,#16213e);border:2px solid #234;border-radius:8px;display:block;cursor:pointer;touch-action:none}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(6,8,16,.88);border-radius:8px;text-align:center;padding:20px;gap:14px}
  .overlay.hidden{display:none}
  .overlay h2{font-size:2rem;color:#5fd0ff}
  .btn{background:#5fd0ff;color:#063;border:none;padding:12px 26px;border-radius:8px;font-weight:bold;cursor:pointer}
  .hint{color:#9aa;font-size:.85rem;line-height:1.6}
</style>
<link rel="stylesheet" href="_arcade.css">
<script src="_i18n.js"></script>
</head>
<body>
<div class="topbar"><a href="../index.html">← 메인으로</a><b>🏗️ 블록 쌓기</b><span id="hud"></span></div>
<div id="wrap">
  <canvas id="cv" width="420" height="600"></canvas>
  <div class="overlay" id="startScreen">
    <h2>블록 쌓기</h2>
    <p class="hint" id="startHint">좌우로 움직이는 블록을 탭/클릭으로 멈춰 정확히 쌓으세요.<br>빗나간 부분은 잘려나가고, 완벽하게 맞추면 보너스!</p>
    <button class="btn" id="startBtn">시작 ▶</button>
    <p class="hint" data-ko="탭 / 클릭 / Space" data-en="Tap / Click / Space">탭 / 클릭 / Space</p>
  </div>
  <div class="overlay hidden" id="endScreen">
    <h2 data-ko="무너졌어요!" data-en="It collapsed!">무너졌어요!</h2>
    <p class="hint" id="endStats"></p>
    <button class="btn" id="restartBtn">🔄 재시작</button>
    <a class="btn alt" href="../index.html">🏠 홈으로</a>
  </div>
</div>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
const hud=document.getElementById('hud');
const BH=34; // block height
let stack,cur,score,best,state,camY,combo,particles;
best=parseInt(localStorage.getItem('stack_best')||'0');

document.getElementById('startHint').innerHTML=t('좌우로 움직이는 블록을 탭/클릭으로 멈춰 정확히 쌓으세요.<br>빗나간 부분은 잘려나가고, 완벽하게 맞추면 보너스!','Tap/click to drop the moving block and stack it precisely.<br>Overhang is sliced off; a perfect hit earns a bonus!');
function hue(i){return `hsl(${(i*18+180)%360} 65% 58%)`;}
function start(){
  stack=[{x:W/2-90,w:180,y:H-BH}];
  score=0;combo=0;camY=0;particles=[];
  spawn();state='play';
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.add('hidden');
}
function spawn(){
  const top=stack[stack.length-1];
  const dir=Math.random()<.5?1:-1;
  const speed=3+Math.min(5,stack.length*0.12);
  cur={x:dir>0?-top.w:W,w:top.w,y:top.y-BH,vx:dir*speed};
}
document.getElementById('startBtn').onclick=start;
document.getElementById('restartBtn').onclick=start;

function place(){
  if(state!=='play'||!cur)return;
  const top=stack[stack.length-1];
  const overlapL=Math.max(cur.x,top.x), overlapR=Math.min(cur.x+cur.w,top.x+top.w);
  const overlap=overlapR-overlapL;
  if(overlap<=0){ return end(); }
  const perfect=Math.abs(cur.x-top.x)<6;
  let nx,nw;
  if(perfect){nx=top.x;nw=top.w;combo++;score+=2;}
  else{ nx=overlapL;nw=overlap;combo=0;score+=1;
    // sliced piece particles
    const sliceX = cur.x<top.x ? cur.x : overlapR;
    spawnSlice(sliceX, cur.y, cur.x<top.x?overlapL-cur.x:cur.x+cur.w-overlapR);
  }
  stack.push({x:nx,w:nw,y:cur.y});
  hud.textContent='🏗️ '+score+(combo>1?'  🔥x'+combo:'');
  // camera scroll up
  if(stack.length>8)camY+=BH;
  spawn();
}
function spawnSlice(x,y,w){
  particles.push({x,y,w:Math.abs(w),h:BH,vy:1,vx:(Math.random()*2-1)*2,rot:0,vr:(Math.random()-.5)*0.2,life:60,color:hue(stack.length)});
}
function end(){
  state='over';
  if(score>best){best=score;localStorage.setItem('stack_best',best);}
  document.getElementById('endStats').innerHTML=t(`높이: <b>${score}</b>층<br>최고: ${best}층`,`Height: <b>${score}</b><br>Best: ${best}`);
  document.getElementById('endScreen').classList.remove('hidden');
}

cv.addEventListener('mousedown',e=>{e.preventDefault();place();});
cv.addEventListener('touchstart',e=>{e.preventDefault();place();},{passive:false});
addEventListener('keydown',e=>{if(e.key===' '){e.preventDefault();place();}});

function update(){
  if(cur){
    cur.x+=cur.vx;
    const top=stack[stack.length-1];
    if(cur.x<-cur.w-20||cur.x>W+20)cur.vx*=-1; // bounce in
    if(cur.x< -cur.w) cur.x=-cur.w; if(cur.x>W) cur.x=W;
  }
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.5;p.rot+=p.vr;p.life--;}
  particles=particles.filter(p=>p.life>0&&p.y<H+camY+100);
}
function draw(){
  ctx.clearRect(0,0,W,H);
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0a0e1a');g.addColorStop(1,'#16213e');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.save();ctx.translate(0,camY);
  // stack
  for(let i=0;i<stack.length;i++){const b=stack[i];
    ctx.fillStyle=hue(i);ctx.fillRect(b.x,b.y,b.w,BH-2);
    ctx.fillStyle='rgba(255,255,255,.18)';ctx.fillRect(b.x,b.y,b.w,5);
    ctx.fillStyle='rgba(0,0,0,.18)';ctx.fillRect(b.x,b.y+BH-6,b.w,4);
  }
  // current
  if(cur&&state==='play'){ctx.fillStyle=hue(stack.length);ctx.fillRect(cur.x,cur.y,cur.w,BH-2);
    ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(cur.x,cur.y,cur.w,5);}
  // particles
  for(const p of particles){ctx.save();ctx.translate(p.x+p.w/2,p.y+p.h/2);ctx.rotate(p.rot);ctx.globalAlpha=Math.min(1,p.life/30);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h-2);ctx.restore();}
  ctx.globalAlpha=1;
  ctx.restore();
}
function loop(){if(state==='play')update();if(stack)draw();requestAnimationFrame(loop);}
ctx.fillStyle='#16213e';ctx.fillRect(0,0,W,H);
stack=[{x:W/2-90,w:180,y:H-BH}];score=0;state='menu';particles=[];camY=0;
requestAnimationFrame(loop);
</script>
</body>
</html>
