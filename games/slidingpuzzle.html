<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🔢 슬라이딩 퍼즐</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI','Malgun Gothic',sans-serif;background:#1a120a;color:#eee;
    display:flex;flex-direction:column;align-items:center;min-height:100vh;user-select:none}
  .topbar{width:100%;max-width:480px;display:flex;justify-content:space-between;align-items:center;padding:10px 16px}
  .topbar a{color:#ff9f5f;text-decoration:none;font-weight:bold}
  h1{margin:6px;color:#ff9f5f}
  .controls{display:flex;gap:8px;margin:8px;flex-wrap:wrap;justify-content:center}
  .opt{padding:8px 14px;border:2px solid #555;border-radius:8px;cursor:pointer;color:#eee;background:none;font-weight:bold}
  .opt.sel{border-color:#ff9f5f;background:rgba(255,159,95,.18)}
  .stats{display:flex;gap:20px;margin:8px;font-size:1.1rem;font-weight:bold}
  #board{position:relative;background:#2a2018;border-radius:12px;padding:8px;margin:10px;touch-action:none}
  .tile{position:absolute;display:flex;align-items:center;justify-content:center;border-radius:10px;
    font-weight:800;cursor:pointer;background:linear-gradient(145deg,#ff9f5f,#e0631a);color:#2a1505;
    transition:left .12s,top .12s;box-shadow:0 3px 6px rgba(0,0,0,.4)}
  .tile:active{filter:brightness(1.1)}
  .btn{background:#ff9f5f;color:#2a1505;border:none;padding:10px 22px;border-radius:8px;font-weight:bold;cursor:pointer;margin:6px}
  .win{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(20,12,4,.82);border-radius:12px;gap:12px;z-index:5}
  .win.hidden{display:none}.win h2{color:#5fffac;font-size:1.8rem}
  .hint{color:#9aa;font-size:.85rem;text-align:center;padding:0 16px}
</style>
<link rel="stylesheet" href="_arcade.css">
<script src="_i18n.js"></script>
</head>
<body>
<div class="topbar"><a href="../index.html" data-ko="← 메인으로" data-en="← Main">← 메인으로</a><b data-ko="🔢 슬라이딩 퍼즐" data-en="🔢 Sliding Puzzle">🔢 슬라이딩 퍼즐</b><span></span></div>
<h1 data-ko="슬라이딩 퍼즐" data-en="Sliding Puzzle">슬라이딩 퍼즐</h1>
<div class="controls">
  <button class="opt sel" data-n="3">3×3</button>
  <button class="opt" data-n="4">4×4</button>
  <button class="opt" data-n="5">5×5</button>
</div>
<div class="stats"><span>🔄 <span id="moves">0</span></span><span>⏱️ <span id="time">0</span>s</span><span>🏆 <span id="best">–</span></span></div>
<div id="board">
  <div class="win hidden" id="winScreen"><h2 data-ko="🎉 완성!" data-en="🎉 Solved!">🎉 완성!</h2><p id="winStats"></p><button class="btn" id="winBtn" data-ko="다시 섞기" data-en="Reshuffle">다시 섞기</button><a class="btn alt" href="../index.html" style="margin-left:6px" data-ko="🏠 홈으로" data-en="🏠 Home">🏠 홈으로</a></div>
</div>
<button class="btn" id="shuffleBtn" data-ko="🔀 새로 섞기" data-en="🔀 New Shuffle">🔀 새로 섞기</button>
<p class="hint" data-ko="빈 칸 옆 타일을 탭하면 밀려납니다. 1부터 순서대로 정렬하세요!" data-en="Tap a tile next to the empty space to slide it. Arrange the numbers in order from 1!">빈 칸 옆 타일을 탭하면 밀려납니다. 1부터 순서대로 정렬하세요!</p>

<script>
const boardEl=document.getElementById('board');
const movesEl=document.getElementById('moves'),timeEl=document.getElementById('time'),bestEl=document.getElementById('best');
let N=3,tiles,blank,moves,size,gap=8,started,timer,timerIv;

document.querySelectorAll('.opt').forEach(o=>o.onclick=()=>{document.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));o.classList.add('sel');N=+o.dataset.n;newGame();});
document.getElementById('shuffleBtn').onclick=newGame;
document.getElementById('winBtn').onclick=newGame;

function boardPx(){return Math.min(420, Math.min(window.innerWidth-30, window.innerHeight*0.5)); }
function layout(){
  const bp=boardPx();size=(bp-gap*(N+1))/N;
  boardEl.style.width=boardEl.style.height=bp+'px';
}
function idx(r,c){return r*N+c;}
function solvable(arr){
  // count inversions
  const a=arr.filter(v=>v!==0);let inv=0;
  for(let i=0;i<a.length;i++)for(let j=i+1;j<a.length;j++)if(a[i]>a[j])inv++;
  if(N%2===1)return inv%2===0;
  const blankRowFromBottom=N-Math.floor(arr.indexOf(0)/N);
  return (blankRowFromBottom%2===0)===(inv%2===1);
}
function newGame(){
  layout();
  clearInterval(timerIv);timer=0;timeEl.textContent=0;started=false;
  moves=0;movesEl.textContent=0;
  document.getElementById('winScreen').classList.add('hidden');
  bestEl.textContent=localStorage.getItem('slide_best_'+N)||'–';
  // generate solved then shuffle solvable & not already solved
  do{
    tiles=[...Array(N*N).keys()]; // 0..N*N-1, 0 is blank
    for(let i=tiles.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[tiles[i],tiles[j]]=[tiles[j],tiles[i]];}
  } while(!solvable(tiles)||isSolved());
  blank=tiles.indexOf(0);
  render();
}
function isSolved(){for(let i=0;i<N*N-1;i++)if(tiles[i]!==i+1)return false;return tiles[N*N-1]===0;}

function render(){
  // keep win overlay
  [...boardEl.querySelectorAll('.tile')].forEach(t=>t.remove());
  for(let i=0;i<tiles.length;i++){
    const v=tiles[i];if(v===0)continue;
    const r=Math.floor(i/N),c=i%N;
    const t=document.createElement('div');t.className='tile';t.textContent=v;
    t.style.width=t.style.height=size+'px';
    t.style.left=(gap+c*(size+gap))+'px';t.style.top=(gap+r*(size+gap))+'px';
    t.style.fontSize=(size*0.4)+'px';
    t.onclick=()=>move(i);
    boardEl.appendChild(t);
  }
}
function move(i){
  const r=Math.floor(i/N),c=i%N, br=Math.floor(blank/N),bc=blank%N;
  if((Math.abs(r-br)===1&&c===bc)||(Math.abs(c-bc)===1&&r===br)){
    if(!started){started=true;timerIv=setInterval(()=>{timer++;timeEl.textContent=timer;},1000);}
    [tiles[i],tiles[blank]]=[tiles[blank],tiles[i]];blank=i;
    moves++;movesEl.textContent=moves;render();
    if(isSolved())win();
  }
}
function win(){
  clearInterval(timerIv);
  const key='slide_best_'+N,prev=localStorage.getItem(key);let rec='';
  if(!prev||moves<+prev){localStorage.setItem(key,moves);rec=t(' (신기록!)',' (New record!)');}
  bestEl.textContent=localStorage.getItem(key);
  document.getElementById('winStats').innerHTML=t(`${moves}번 이동 · ${timer}초${rec}`,`${moves} moves · ${timer}s${rec}`);
  document.getElementById('winScreen').classList.remove('hidden');
}
// swipe support
let sx,sy;
boardEl.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
boardEl.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
  if(Math.max(Math.abs(dx),Math.abs(dy))<24)return;
  const br=Math.floor(blank/N),bc=blank%N;let ti=-1;
  if(Math.abs(dx)>Math.abs(dy)){ if(dx>0&&bc>0)ti=idx(br,bc-1); else if(dx<0&&bc<N-1)ti=idx(br,bc+1);}
  else{ if(dy>0&&br>0)ti=idx(br-1,bc); else if(dy<0&&br<N-1)ti=idx(br+1,bc);}
  if(ti>=0)move(ti);
},{passive:true});
addEventListener('keydown',e=>{
  const br=Math.floor(blank/N),bc=blank%N;let ti=-1;
  if(e.key==='ArrowRight'&&bc>0)ti=idx(br,bc-1);
  else if(e.key==='ArrowLeft'&&bc<N-1)ti=idx(br,bc+1);
  else if(e.key==='ArrowDown'&&br>0)ti=idx(br-1,bc);
  else if(e.key==='ArrowUp'&&br<N-1)ti=idx(br+1,bc);
  if(ti>=0){e.preventDefault();move(ti);}
});
addEventListener('resize',()=>{layout();render();});
newGame();
</script>
</body>
</html>
