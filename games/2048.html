<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔢 2048</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI','Malgun Gothic',sans-serif;background:#1a1714;color:#eee;
    display:flex;flex-direction:column;align-items:center;min-height:100vh;user-select:none;touch-action:none}
  .topbar{width:100%;max-width:480px;display:flex;justify-content:space-between;align-items:center;padding:10px 16px}
  .topbar a{color:#edc22e;text-decoration:none;font-weight:bold}
  .head{display:flex;justify-content:space-between;width:460px;max-width:94vw;align-items:center;margin:6px 0}
  h1{font-size:2.4rem;color:#edc22e}
  .scores{display:flex;gap:10px}
  .sbox{background:#3a3530;padding:8px 18px;border-radius:8px;text-align:center}
  .sbox .l{font-size:.7rem;color:#bbada0;text-transform:uppercase}
  .sbox .v{font-size:1.4rem;font-weight:bold}
  .bar{display:flex;justify-content:space-between;width:460px;max-width:94vw;align-items:center;margin:6px 0}
  .btn{background:#8f7a66;color:#fff;border:none;padding:10px 18px;border-radius:8px;font-weight:bold;cursor:pointer}
  #board{position:relative;background:#bbada0;border-radius:10px;padding:12px;
    width:460px;height:460px;max-width:94vw;max-height:94vw}
  .grid-bg{position:absolute;inset:12px;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:12px}
  .gcell{background:rgba(238,228,218,.35);border-radius:8px}
  .tile{position:absolute;display:flex;align-items:center;justify-content:center;font-weight:bold;border-radius:8px;
    transition:left .12s ease,top .12s ease;color:#776e65}
  .pop{animation:pop .18s}
  @keyframes pop{0%{transform:scale(.3)}100%{transform:scale(1)}}
  .merge{animation:mg .18s}
  @keyframes mg{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(238,228,218,.78);color:#776e65;border-radius:10px;gap:14px;z-index:5}
  .overlay.hidden{display:none}
  .overlay h2{font-size:2.2rem}
  .hint{color:#bbada0;font-size:.85rem;margin-top:10px;text-align:center}
  kbd{background:#3a3530;border:1px solid #555;border-radius:4px;padding:1px 6px;color:#eee}
</style>
<link rel="stylesheet" href="_arcade.css">
</head>
<body>
<div class="topbar"><a href="../index.html">← 메인으로</a><b>🔢 2048</b><span></span></div>
<div class="head">
  <h1>2048</h1>
  <div class="scores">
    <div class="sbox"><div class="l">점수</div><div class="v" id="score">0</div></div>
    <div class="sbox"><div class="l">최고</div><div class="v" id="best">0</div></div>
  </div>
</div>
<div class="bar">
  <span style="color:#bbada0;font-size:.9rem">숫자를 합쳐 2048을 만드세요!</span>
  <button class="btn" id="newBtn">새 게임</button>
</div>
<div id="board">
  <div class="grid-bg" id="gridbg"></div>
  <div class="overlay hidden" id="overlay">
    <h2 id="ovTitle"></h2>
    <button class="btn" id="ovBtn">다시 시작</button>
    <a class="btn alt" href="../index.html">🏠 홈으로</a>
  </div>
</div>
<p class="hint"><kbd>←↑↓→</kbd> 또는 <kbd>WASD</kbd> · 모바일은 스와이프</p>

<script>
const N=4;
let grid,score,best,over,won,idc=0;
const boardEl=document.getElementById('board'),scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
best=parseInt(localStorage.getItem('g2048_best')||'0');bestEl.textContent=best;
const COLORS={2:'#eee4da',4:'#ede0c8',8:'#f2b179',16:'#f59563',32:'#f67c5f',64:'#f65e3b',
  128:'#edcf72',256:'#edcc61',512:'#edc850',1024:'#edc53f',2048:'#edc22e'};
const tiles=new Map(); // id -> element

const gb=document.getElementById('gridbg');
for(let i=0;i<16;i++){const d=document.createElement('div');d.className='gcell';gb.appendChild(d);}

function cellSize(){return (boardEl.clientWidth-12*2-12*3)/4;}
function pos(r,c){const s=cellSize();return {x:12+c*(s+12),y:12+r*(s+12),s};}

function newGame(){
  grid=Array.from({length:N},()=>Array(N).fill(null));
  tiles.forEach(el=>el.remove());tiles.clear();
  score=0;over=false;won=false;scoreEl.textContent=0;
  document.getElementById('overlay').classList.add('hidden');
  addTile();addTile();render();
}
function emptyCells(){const e=[];for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(!grid[r][c])e.push([r,c]);return e;}
function addTile(){
  const e=emptyCells();if(!e.length)return;
  const [r,c]=e[Math.floor(Math.random()*e.length)];
  grid[r][c]={v:Math.random()<0.9?2:4,id:idc++,r,c,nw:true};
}

function render(){
  const s=cellSize();
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const t=grid[r][c];if(!t)continue;
    let el=tiles.get(t.id);
    if(!el){el=document.createElement('div');el.className='tile';boardEl.appendChild(el);tiles.set(t.id,el);
      if(t.nw)el.classList.add('pop');}
    const p=pos(r,c);
    el.style.width=el.style.height=s+'px';
    el.style.left=p.x+'px';el.style.top=p.y+'px';
    el.style.fontSize=(t.v<100?s*0.42:t.v<1000?s*0.34:s*0.26)+'px';
    el.style.background=COLORS[t.v]||'#3c3a32';
    el.style.color=t.v<=4?'#776e65':'#f9f6f2';
    el.textContent=t.v;
    if(t.merged){el.classList.add('merge');setTimeout(()=>el.classList.remove('merge'),180);t.merged=false;}
    t.nw=false;
  }
}

function slide(line){
  // line: array of tiles or null; move toward index 0
  let arr=line.filter(Boolean);
  let res=[],gained=0;
  for(let i=0;i<arr.length;i++){
    if(i+1<arr.length&&arr[i].v===arr[i+1].v){
      const v=arr[i].v*2;gained+=v;
      res.push({...arr[i],v,merged:true,removeId:arr[i+1].id});
      i++;
    } else res.push(arr[i]);
  }
  while(res.length<N)res.push(null);
  return {res,gained};
}

function move(dir){
  if(over)return;
  // build lines depending on dir, slide, write back, detect change
  let moved=false,gainedTotal=0;const removeIds=[];
  const get=(i,j)=>{ // returns grid cell based on orientation
    if(dir==='left')return grid[i][j];
    if(dir==='right')return grid[i][N-1-j];
    if(dir==='up')return grid[j][i];
    return grid[N-1-j][i]; // down
  };
  const set=(i,j,val)=>{
    if(dir==='left')grid[i][j]=val;
    else if(dir==='right')grid[i][N-1-j]=val;
    else if(dir==='up')grid[j][i]=val;
    else grid[N-1-j][i]=val;
  };
  for(let i=0;i<N;i++){
    const line=[];for(let j=0;j<N;j++)line.push(get(i,j));
    const before=line.map(t=>t?t.id:0).join(',');
    const {res,gained}=slide(line);
    gainedTotal+=gained;
    const after=res.map(t=>t?t.id:0).join(',');
    if(before!==after)moved=true;
    for(let j=0;j<N;j++){
      const t=res[j];
      if(t){if(t.removeId!=null){removeIds.push(t.removeId);delete t.removeId;}set(i,j,{...t});}
      else set(i,j,null);
    }
  }
  // sync r,c on tiles
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){const t=grid[r][c];if(t){t.r=r;t.c=c;}}
  if(moved){
    // remove merged-away tiles
    removeIds.forEach(id=>{const el=tiles.get(id);if(el){el.remove();tiles.delete(id);}});
    // remove tiles whose ids no longer present
    const present=new Set();for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(grid[r][c])present.add(grid[r][c].id);
    tiles.forEach((el,id)=>{if(!present.has(id)){el.remove();tiles.delete(id);}});
    score+=gainedTotal;scoreEl.textContent=score;
    if(score>best){best=score;localStorage.setItem('g2048_best',best);bestEl.textContent=best;}
    render();
    setTimeout(()=>{addTile();render();checkEnd();},120);
  }
}

function checkEnd(){
  if(!won&&grid.some(row=>row.some(t=>t&&t.v>=2048))){won=true;showOverlay('🎉 2048 달성!');return;}
  if(emptyCells().length>0)return;
  // any merges possible?
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const v=grid[r][c].v;
    if(c+1<N&&grid[r][c+1].v===v)return;
    if(r+1<N&&grid[r+1][c].v===v)return;
  }
  over=true;showOverlay('게임 오버');
}
function showOverlay(t){document.getElementById('ovTitle').textContent=t;document.getElementById('overlay').classList.remove('hidden');}

addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();let dir=null;
  if(k==='arrowleft'||k==='a')dir='left';
  else if(k==='arrowright'||k==='d')dir='right';
  else if(k==='arrowup'||k==='w')dir='up';
  else if(k==='arrowdown'||k==='s')dir='down';
  if(dir){e.preventDefault();move(dir);}
});
// swipe
let tx,ty;
boardEl.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
boardEl.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.max(Math.abs(dx),Math.abs(dy))<24)return;
  if(Math.abs(dx)>Math.abs(dy))move(dx>0?'right':'left');else move(dy>0?'down':'up');
});
addEventListener('resize',()=>render());
document.getElementById('newBtn').onclick=newGame;
document.getElementById('ovBtn').onclick=newGame;
newGame();
</script>
</body>
</html>
