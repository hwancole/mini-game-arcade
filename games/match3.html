<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💎 보석 맞추기</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI','Malgun Gothic',sans-serif;background:#10081a;color:#eee;
    display:flex;flex-direction:column;align-items:center;min-height:100vh;user-select:none}
  .topbar{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:10px 16px}
  .topbar a{color:#ff5f9f;text-decoration:none;font-weight:bold}
  h1{margin:4px;color:#ff5f9f;font-size:1.4rem}
  .stats{display:flex;gap:18px;margin:8px;font-size:1.05rem;font-weight:bold}
  #wrap{position:relative}
  canvas{background:#1a0f2a;border:2px solid #3a1f50;border-radius:12px;display:block;touch-action:none}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(8,4,16,.9);border-radius:12px;text-align:center;gap:12px;z-index:5;padding:20px}
  .overlay.hidden{display:none}.overlay h2{color:#ff5f9f;font-size:1.9rem}
  .btn{background:#ff5f9f;color:#fff;border:none;padding:12px 26px;border-radius:8px;font-weight:bold;cursor:pointer}
  .hint{color:#9aa;font-size:.85rem;text-align:center;padding:0 16px;line-height:1.6}
</style>
<link rel="stylesheet" href="_arcade.css">
</head>
<body>
<div class="topbar"><a href="../index.html">← 메인으로</a><b>💎 보석 맞추기</b><span></span></div>
<h1>보석 맞추기</h1>
<div class="stats"><span>⭐ <span id="score">0</span></span><span>🔄 <span id="moves">20</span></span><span>🏆 <span id="best">0</span></span></div>
<div id="wrap">
  <canvas id="cv" width="480" height="480"></canvas>
  <div class="overlay" id="startScreen">
    <h2>보석 맞추기</h2>
    <p class="hint">인접한 두 보석을 바꿔(탭 또는 스와이프) 같은 색 3개 이상을 만드세요!<br>20번의 이동 안에 최대한 높은 점수를 노리세요.</p>
    <button class="btn" id="startBtn">시작 ▶</button>
  </div>
  <div class="overlay hidden" id="endScreen">
    <h2>게임 종료</h2>
    <p class="hint" id="endStats"></p>
    <button class="btn" id="restartBtn">🔄 다시하기</button>
  </div>
</div>
<p class="hint">3매치 +30점 · 4매치 이상·연쇄 콤보는 추가 보너스!</p>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),SIZE=8,CELL=cv.width/SIZE;
const scoreEl=document.getElementById('score'),movesEl=document.getElementById('moves'),bestEl=document.getElementById('best');
const COLORS=['#ff5f6d','#5fd0ff','#ffd35f','#5fffac','#c46fff','#ff9f5f'];
const GEMS=['🔴','🔷','🟡','🟢','🟣','🟠'];
let grid,score,movesLeft,state,sel,anim,best;
best=parseInt(localStorage.getItem('match3_best')||'0');bestEl.textContent=best;

function rc(){return Math.floor(Math.random()*COLORS.length);}
function makeGrid(){
  grid=Array.from({length:SIZE},()=>Array.from({length:SIZE},()=>rc()));
  // remove initial matches
  let guard=0;
  while(findMatches().length&&guard++<100){
    for(const [r,c] of findMatches())grid[r][c]=rc();
  }
}
function findMatches(){
  const m=new Set();
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE-2;c++){const v=grid[r][c];if(v!=null&&v===grid[r][c+1]&&v===grid[r][c+2]){m.add(r+','+c);m.add(r+','+(c+1));m.add(r+','+(c+2));}}
  for(let c=0;c<SIZE;c++)for(let r=0;r<SIZE-2;r++){const v=grid[r][c];if(v!=null&&v===grid[r+1][c]&&v===grid[r+2][c]){m.add(r+','+c);m.add((r+1)+','+c);m.add((r+2)+','+c);}}
  return [...m].map(s=>s.split(',').map(Number));
}
function start(){
  makeGrid();score=0;movesLeft=20;state='play';sel=null;
  scoreEl.textContent=0;movesEl.textContent=20;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.add('hidden');
  draw();
}
document.getElementById('startBtn').onclick=start;
document.getElementById('restartBtn').onclick=start;

function swap(a,b){const t=grid[a.r][a.c];grid[a.r][a.c]=grid[b.r][b.c];grid[b.r][b.c]=t;}
function adjacent(a,b){return Math.abs(a.r-b.r)+Math.abs(a.c-b.c)===1;}

async function trySwap(a,b){
  if(state!=='play'||!adjacent(a,b))return;
  swap(a,b);
  if(findMatches().length===0){swap(a,b);sel=null;draw();return;} // no match, revert
  movesLeft--;movesEl.textContent=movesLeft;sel=null;
  state='resolve';
  await resolve();
  state='play';draw();
  if(movesLeft<=0)end();
}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}
async function resolve(){
  let combo=0;
  while(true){
    const matches=findMatches();
    if(!matches.length)break;
    combo++;
    score+=matches.length*10+ (combo-1)*15 + Math.max(0,matches.length-3)*10;
    scoreEl.textContent=score;
    for(const [r,c] of matches)grid[r][c]=null;
    draw();await delay(180);
    // gravity
    for(let c=0;c<SIZE;c++){
      let col=[];for(let r=SIZE-1;r>=0;r--)if(grid[r][c]!=null)col.push(grid[r][c]);
      for(let r=SIZE-1;r>=0;r--)grid[r][c]= col[SIZE-1-r]!=null?col[SIZE-1-r]:rc();
    }
    draw();await delay(180);
  }
}

function cellAt(px,py){const r=cv.getBoundingClientRect();const x=(px-r.left)*(cv.width/r.width),y=(py-r.top)*(cv.height/r.height);return {r:Math.floor(y/CELL),c:Math.floor(x/CELL)};}
cv.addEventListener('click',e=>{
  if(state!=='play')return;
  const cell=cellAt(e.clientX,e.clientY);
  if(cell.r<0||cell.r>=SIZE||cell.c<0||cell.c>=SIZE)return;
  if(!sel){sel=cell;draw();}
  else if(sel.r===cell.r&&sel.c===cell.c){sel=null;draw();}
  else if(adjacent(sel,cell)){trySwap(sel,cell);}
  else{sel=cell;draw();}
});
let sx,sy,scell;
cv.addEventListener('touchstart',e=>{const t=e.touches[0];sx=t.clientX;sy=t.clientY;scell=cellAt(sx,sy);},{passive:true});
cv.addEventListener('touchend',e=>{
  if(state!=='play'||!scell)return;
  const t=e.changedTouches[0],dx=t.clientX-sx,dy=t.clientY-sy;
  if(Math.max(Math.abs(dx),Math.abs(dy))<18){ // tap = select
    if(scell.r>=0&&scell.r<SIZE&&scell.c>=0&&scell.c<SIZE){
      if(!sel)sel=scell;else if(adjacent(sel,scell))trySwap(sel,scell);else sel=scell;draw();
    }
    return;
  }
  let to={...scell};
  if(Math.abs(dx)>Math.abs(dy))to.c+=dx>0?1:-1;else to.r+=dy>0?1:-1;
  if(to.r>=0&&to.r<SIZE&&to.c>=0&&to.c<SIZE)trySwap(scell,to);
},{passive:true});

function draw(){
  ctx.fillStyle='#1a0f2a';ctx.fillRect(0,0,cv.width,cv.height);
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    const v=grid[r][c];if(v==null)continue;
    const x=c*CELL,y=r*CELL;
    ctx.fillStyle=COLORS[v];
    const pad=6;
    roundRect(x+pad,y+pad,CELL-pad*2,CELL-pad*2,10);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.arc(x+CELL*0.36,y+CELL*0.34,CELL*0.1,0,7);ctx.fill();
    if(sel&&sel.r===r&&sel.c===c){ctx.strokeStyle='#fff';ctx.lineWidth=4;roundRect(x+3,y+3,CELL-6,CELL-6,12);ctx.stroke();}
  }
}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function end(){
  state='over';
  if(score>best){best=score;localStorage.setItem('match3_best',best);bestEl.textContent=best;}
  document.getElementById('endStats').innerHTML=`최종 점수: <b>${score}</b><br>최고: ${best}`;
  document.getElementById('endScreen').classList.remove('hidden');
}
makeGrid();state='menu';draw();
</script>
</body>
</html>
