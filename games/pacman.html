<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>👻 팩맨</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI','Malgun Gothic',sans-serif;background:#000010;color:#eee;
    display:flex;flex-direction:column;align-items:center;min-height:100vh}
  .topbar{width:100%;max-width:560px;display:flex;justify-content:space-between;align-items:center;padding:10px 16px}
  .topbar a{color:#ffd35f;text-decoration:none;font-weight:bold}
  .stats{display:flex;gap:22px;margin:6px;font-size:1.05rem;font-weight:bold}
  #wrap{position:relative}
  canvas{background:#000010;border:2px solid #1a1a55;border-radius:8px;display:block;touch-action:none}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(0,0,16,.9);border-radius:8px;text-align:center;gap:14px;padding:20px}
  .overlay.hidden{display:none}.overlay h2{color:#ffd35f;font-size:2rem}
  .btn{background:#ffd35f;color:#222;border:none;padding:12px 26px;border-radius:8px;font-weight:bold;cursor:pointer}
  .hint{color:#9aa;font-size:.85rem;line-height:1.6}
  kbd{background:#222;border:1px solid #444;border-radius:4px;padding:1px 6px}
</style>
<link rel="stylesheet" href="_arcade.css">
<script src="_i18n.js"></script>
</head>
<body>
<div class="topbar"><a href="../index.html">← 메인으로</a><b>👻 팩맨</b><span id="hud"></span></div>
<div id="wrap">
  <canvas id="cv" width="480" height="480"></canvas>
  <div class="overlay" id="startScreen">
    <h2>팩맨</h2>
    <p class="hint"><span data-ko="미로의 점을 모두 먹으면 다음 레벨! 유령 4종은 성격이 다릅니다(추격·매복·협공·소심)." data-en="Eat all dots to advance a level! The 4 ghosts each behave differently (chase, ambush, flank, shy).">미로의 점을 모두 먹으면 다음 레벨! 유령 4종은 성격이 다릅니다(추격·매복·협공·소심).</span><br>💊 <span data-ko="파워펠릿으로 유령 잡기 · 🍒보너스 과일 등장 · 레벨이 오를수록 빨라집니다!" data-en="Power pellets let you chomp ghosts · 🍒bonus fruit appears · ghosts speed up each level!">파워펠릿으로 유령 잡기 · 🍒보너스 과일 등장 · 레벨이 오를수록 빨라집니다!</span></p>
    <button class="btn" id="startBtn">시작 ▶</button>
    <p class="hint"><kbd data-ko="방향키" data-en="Arrows">방향키</kbd> · <span data-ko="스와이프 · 아래 버튼으로 이동" data-en="Swipe · or use the buttons below">스와이프 · 아래 버튼으로 이동</span></p>
  </div>
  <div class="overlay hidden" id="endScreen">
    <h2 id="endTitle"></h2>
    <p class="hint" id="endStats"></p>
    <button class="btn" id="restartBtn">🔄 재시작</button>
    <a class="btn alt" href="../index.html">🏠 홈으로</a>
  </div>
</div>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),hud=document.getElementById('hud');
const N=15; let S=cv.width/N;
let cells,dots,dotCount,dotMax,pac,ghosts,score,lives,state,fright,frightT,ghostEaten,level,
    mode,modeTimer,readyT,fruit,fruitSpawned,flashT;
const GC=['#ff5f6d','#ffb8de','#5fd0ff','#ffae5f'];
const CORNERS=[[0,0],[N-1,0],[0,N-1],[N-1,N-1]];

// ---- 사운드 ----
let actx=null, wakaTog=0;
function AC(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return actx; }
function tone(f,f2,dur,type,vol,when){ const a=AC(); if(!a)return; const o=a.createOscillator(),g=a.createGain(),t0=a.currentTime+(when||0);
  o.type=type||'square'; o.frequency.setValueAtTime(f,t0); if(f2)o.frequency.exponentialRampToValueAtTime(Math.max(20,f2),t0+dur);
  g.gain.setValueAtTime(vol||0.08,t0); g.gain.exponentialRampToValueAtTime(0.0008,t0+dur); o.connect(g); g.connect(a.destination); o.start(t0); o.stop(t0+dur); }
function sfx(type){ switch(type){
  case 'waka': wakaTog^=1; tone(wakaTog?300:200,wakaTog?200:300,0.06,'square',0.05); break;
  case 'pellet': tone(440,660,0.14,'square',0.09); break;
  case 'eatghost': tone(400,1200,0.18,'square',0.1); break;
  case 'fruit': tone(700,1100,0.16,'triangle',0.1); break;
  case 'death': [600,500,400,300,200,120].forEach((f,i)=>tone(f,f,0.12,'square',0.12,i*0.1)); break;
  case 'clear': [523,659,784,1047,784,1047].forEach((f,i)=>tone(f,f,0.12,'square',0.11,i*0.1)); break;
  case 'extralife': tone(880,1320,0.2,'square',0.12); break;
  case 'ready': [392,523,659].forEach((f,i)=>tone(f,f,0.14,'square',0.1,i*0.16)); break;
} }

function genMaze(){
  cells=Array.from({length:N},()=>Array.from({length:N},()=>({n:true,e:true,s:true,w:true,v:false})));
  const stack=[[0,0]];cells[0][0].v=true;
  while(stack.length){
    const [x,y]=stack[stack.length-1],nb=[];
    if(y>0&&!cells[y-1][x].v)nb.push([x,y-1,'n','s']);
    if(x<N-1&&!cells[y][x+1].v)nb.push([x+1,y,'e','w']);
    if(y<N-1&&!cells[y+1][x].v)nb.push([x,y+1,'s','n']);
    if(x>0&&!cells[y][x-1].v)nb.push([x-1,y,'w','e']);
    if(nb.length){const [nx,ny,d,od]=nb[Math.floor(Math.random()*nb.length)];
      cells[y][x][d]=false;cells[ny][nx][od]=false;cells[ny][nx].v=true;stack.push([nx,ny]);}
    else stack.pop();
  }
  // 루프 추가(막다른 길 감소)로 팩맨답게
  for(let k=0;k<N*N*0.5;k++){
    const x=Math.floor(Math.random()*N),y=Math.floor(Math.random()*N);
    const dirs=[['e',x+1,y,'w'],['s',x,y+1,'n']].filter(([d,nx,ny])=>nx<N&&ny<N);
    if(dirs.length){const [d,nx,ny,od]=dirs[Math.floor(Math.random()*dirs.length)];cells[y][x][d]=false;cells[ny][nx][od]=false;}
  }
}
function open(x,y,dir){const c=cells[y][x];return dir.x===1?!c.e:dir.x===-1?!c.w:dir.y===1?!c.s:!c.n;}
function center(cx,cy){return {x:cx*S+S/2,y:cy*S+S/2};}

const DIRS=[{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
function startLevel(){
  genMaze();
  dots=Array.from({length:N},()=>Array(N).fill(1));
  CORNERS.forEach(([x,y])=>{dots[y][x]=2;});
  pac={cx:N>>1,cy:N>>1,dir:{x:0,y:0},next:{x:0,y:0},t:0,mouth:0};
  dots[pac.cy][pac.cx]=0;
  dotCount=0;for(let y=0;y<N;y++)for(let x=0;x<N;x++)if(dots[y][x])dotCount++;
  dotMax=dotCount;
  ghosts=[];
  for(let i=0;i<4;i++)ghosts.push({cx:CORNERS[i][0],cy:CORNERS[i][1],dir:{...DIRS[i%4]},t:0,color:GC[i],home:CORNERS[i],dead:false,personality:i});
  fright=false;frightT=0;ghostEaten=0;
  mode='scatter';modeTimer=0;readyT=70;fruit=null;fruitSpawned=false;flashT=0;
  state='play'; sfx('ready');
}
function start(){
  AC(); score=0;lives=3;level=1; startLevel();
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.add('hidden');
}
document.getElementById('startBtn').onclick=start;
document.getElementById('restartBtn').onclick=start;

function setDir(dx,dy){if(pac)pac.next={x:dx,y:dy};}
addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'){setDir(1,0);e.preventDefault();}else if(e.key==='ArrowLeft'){setDir(-1,0);e.preventDefault();}
  else if(e.key==='ArrowDown'){setDir(0,1);e.preventDefault();}else if(e.key==='ArrowUp'){setDir(0,-1);e.preventDefault();}
});
let sx,sy;
cv.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
cv.addEventListener('touchmove',e=>{e.preventDefault();},{passive:false});
cv.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
  if(Math.max(Math.abs(dx),Math.abs(dy))<16)return;
  if(Math.abs(dx)>Math.abs(dy))setDir(dx>0?1:-1,0);else setDir(0,dy>0?1:-1);},{passive:true});

function moveEntity(e,speed,chooser){
  if(e.t===0){
    if(chooser)chooser(e);
    else{ // pac
      if((pac.next.x||pac.next.y)&&open(e.cx,e.cy,pac.next))e.dir=pac.next;
      if(!(e.dir.x||e.dir.y)||!open(e.cx,e.cy,e.dir))e.dir={x:0,y:0};
    }
  }
  if(e.dir.x||e.dir.y){
    e.t+=speed;
    if(e.t>=1){e.cx+=e.dir.x;e.cy+=e.dir.y;e.t=0;return true;}
  }
  return false;
}
function ghostTarget(g){
  if(mode==='scatter') return {x:g.home[0],y:g.home[1]};
  const pd=pac.dir;
  switch(g.personality){
    case 0: return {x:pac.cx,y:pac.cy};                                  // 빨강: 직접 추격
    case 1: return {x:pac.cx+pd.x*4,y:pac.cy+pd.y*4};                    // 분홍: 매복(앞을 노림)
    case 2: return {x:pac.cx+pd.x*2+(g.cx<pac.cx?3:-3),y:pac.cy+pd.y*2}; // 하늘: 협공(측면)
    default: return dist(g.cx,g.cy,pac.cx,pac.cy)>5?{x:pac.cx,y:pac.cy}:{x:g.home[0],y:g.home[1]}; // 주황: 소심
  }
}
function ghostChoose(g){
  const opts=DIRS.filter(d=>open(g.cx,g.cy,d)&&!(d.x===-g.dir.x&&d.y===-g.dir.y));
  const list=opts.length?opts:DIRS.filter(d=>open(g.cx,g.cy,d));
  if(!list.length){g.dir={x:0,y:0};return;}
  if(list.length===1){g.dir=list[0];return;}
  if(fright){ g.dir=list.reduce((a,b)=>dist(g.cx+a.x,g.cy+a.y,pac.cx,pac.cy)>dist(g.cx+b.x,g.cy+b.y,pac.cx,pac.cy)?a:b); return; }
  const tg=ghostTarget(g);
  g.dir=list.reduce((a,b)=>dist(g.cx+a.x,g.cy+a.y,tg.x,tg.y)<dist(g.cx+b.x,g.cy+b.y,tg.x,tg.y)?a:b);
}
function dist(x1,y1,x2,y2){return Math.hypot(x1-x2,y1-y2);}

function updateHUD(){ hud.textContent=t('레벨 ','Lv ')+level+'  ⭐'+score+'  '+'❤️'.repeat(Math.max(0,lives)); }
function spawnFruit(){
  const ec=[]; for(let y=0;y<N;y++)for(let x=0;x<N;x++)if(dots[y][x]===0&&!(x===pac.cx&&y===pac.cy))ec.push([x,y]);
  if(!ec.length)return; const [x,y]=ec[Math.floor(Math.random()*ec.length)];
  const fruits=[['🍒',100],['🍓',200],['🍊',300],['🍎',400],['🍇',500]];
  const f=fruits[Math.min(level-1,fruits.length-1)];
  fruit={cx:x,cy:y,emoji:f[0],points:f[1],life:480};
}
function update(){
  pac.mouth=(pac.mouth+0.15)%1;
  if(flashT>0){ flashT--; if(flashT===0)startLevel(); return; }   // 레벨 클리어 연출
  if(readyT>0){ readyT--; updateHUD(); return; }                  // READY! 유예
  // 흩어지기 ↔ 추격 모드 전환
  if(!fright){ modeTimer++; if(mode==='scatter'&&modeTimer>360){mode='chase';modeTimer=0;} else if(mode==='chase'&&modeTimer>1100){mode='scatter';modeTimer=0;} }
  const pSpeed=0.115, gSpeed=fright?0.058:Math.min(0.12,0.082+(level-1)*0.006);
  const arrived=moveEntity(pac,pSpeed);
  if(arrived||(pac.t===0&&(pac.dir.x||pac.dir.y))){
    if(dots[pac.cy][pac.cx]===1){dots[pac.cy][pac.cx]=0;score+=10;dotCount--;sfx('waka');}
    else if(dots[pac.cy][pac.cx]===2){dots[pac.cy][pac.cx]=0;score+=50;dotCount--;fright=true;frightT=Math.max(120,360-level*25);ghostEaten=0;sfx('pellet');}
  }
  if(!fruitSpawned && dotCount<=dotMax*0.5){ spawnFruit(); fruitSpawned=true; }
  if(fruit){ fruit.life--;
    if(fruit.cx===pac.cx&&fruit.cy===pac.cy){ score+=fruit.points; sfx('fruit'); fruit=null; }
    else if(fruit.life<=0) fruit=null; }
  if(fright){frightT--;if(frightT<=0)fright=false;}
  const pp=pxPos(pac);
  for(const g of ghosts){
    if(g.dead){
      moveEntity(g,0.2,gg=>{const tx=gg.home[0],ty=gg.home[1];const list=DIRS.filter(d=>open(gg.cx,gg.cy,d));
        gg.dir=list.length?list.reduce((a,b)=>dist(gg.cx+a.x,gg.cy+a.y,tx,ty)<dist(gg.cx+b.x,gg.cy+b.y,tx,ty)?a:b):{x:0,y:0};});
      if(g.cx===g.home[0]&&g.cy===g.home[1]&&g.t===0)g.dead=false;
      continue;
    }
    moveEntity(g,gSpeed,ghostChoose);
    const gp=pxPos(g);
    if(Math.hypot(pp.x-gp.x,pp.y-gp.y)<S*0.55){
      if(fright){ g.dead=true;ghostEaten++; score+=200*Math.pow(2,ghostEaten-1); sfx('eatghost'); }
      else return loseLife();
    }
  }
  updateHUD();
  if(dotCount<=0)return win();
}
function loseLife(){
  lives--; sfx('death');
  if(lives<=0)return end(false);
  pac.cx=N>>1;pac.cy=N>>1;pac.dir={x:0,y:0};pac.next={x:0,y:0};pac.t=0;
  ghosts.forEach((g,i)=>{g.cx=g.home[0];g.cy=g.home[1];g.t=0;g.dead=false;g.dir={...DIRS[i%4]};});
  fright=false;frightT=0;mode='scatter';modeTimer=0;readyT=60;
}
function win(){ level++; flashT=90; sfx('clear'); if(level%3===0){lives++;sfx('extralife');} }
function end(w){
  state='over';
  document.getElementById('endTitle').textContent=w?t('🏆 클리어!','🏆 Clear!'):t('💀 게임 오버','💀 Game Over');
  const key='pacman_best', prev=parseInt(localStorage.getItem(key)||'0');
  const isNew=score>prev; if(isNew)localStorage.setItem(key,score);
  document.getElementById('endStats').innerHTML=t(`점수: <b>${score}</b>`,`Score: <b>${score}</b>`)+
    t(`<br>🏆 최고 점수: <b>${Math.max(prev,score)}</b>${isNew?' 🎉 신기록!':''}`,`<br>🏆 Best: <b>${Math.max(prev,score)}</b>${isNew?' 🎉 New Record!':''}`)+
    t(`<br><span style="font-size:.76rem;color:#9aa">기록은 이 기기에만 저장됩니다</span>`,`<br><span style="font-size:.76rem;color:#9aa">Records are saved on this device only</span>`);
  document.getElementById('endScreen').classList.remove('hidden');
}

function pxPos(e){const c=center(e.cx,e.cy);return {x:c.x+e.dir.x*S*e.t,y:c.y+e.dir.y*S*e.t};}
function draw(){
  ctx.fillStyle='#000010';ctx.fillRect(0,0,cv.width,cv.height);
  // walls
  ctx.strokeStyle='#3a3aff';ctx.lineWidth=Math.max(2,S*0.13);ctx.lineCap='round';
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){const c=cells[y][x],px=x*S,py=y*S;
    ctx.beginPath();
    if(c.n){ctx.moveTo(px,py);ctx.lineTo(px+S,py);}
    if(c.e){ctx.moveTo(px+S,py);ctx.lineTo(px+S,py+S);}
    if(c.s){ctx.moveTo(px,py+S);ctx.lineTo(px+S,py+S);}
    if(c.w){ctx.moveTo(px,py);ctx.lineTo(px,py+S);}
    ctx.stroke();
  }
  // dots
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){
    if(dots[y][x]===1){ctx.fillStyle='#ffd9a0';ctx.beginPath();ctx.arc(x*S+S/2,y*S+S/2,S*0.08,0,7);ctx.fill();}
    else if(dots[y][x]===2){ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x*S+S/2,y*S+S/2,S*0.2*(0.7+0.3*Math.sin(Date.now()/200)),0,7);ctx.fill();}
  }
  // 과일 보너스
  if(fruit){ ctx.font=(S*0.62)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(fruit.emoji,fruit.cx*S+S/2,fruit.cy*S+S/2); }
  // pac
  const p=pxPos(pac);const ang=Math.atan2(pac.dir.y,pac.dir.x);
  const m=Math.abs(Math.sin(pac.mouth*Math.PI))*0.32+0.02;
  ctx.fillStyle='#ffd35f';ctx.beginPath();ctx.moveTo(p.x,p.y);
  ctx.arc(p.x,p.y,S*0.38,ang+m,ang+Math.PI*2-m);ctx.closePath();ctx.fill();
  // ghosts
  for(const g of ghosts){const gp=pxPos(g),r=S*0.36;
    if(!g.dead){
      ctx.fillStyle=fright?(frightT<90&&Math.floor(frightT/8)%2?'#fff':'#2a2aff'):g.color;
      ctx.beginPath();ctx.arc(gp.x,gp.y-r*0.1,r,Math.PI,0);
      ctx.lineTo(gp.x+r,gp.y+r*0.7);
      for(let i=0;i<3;i++)ctx.lineTo(gp.x+r-(i*2+1)*r/3,gp.y+r*(i%2?0.7:0.4));
      ctx.lineTo(gp.x-r,gp.y+r*0.7);ctx.closePath();ctx.fill();
    }
    if(fright&&!g.dead){ // 겁먹은 표정
      ctx.fillStyle='#fcd';ctx.beginPath();ctx.arc(gp.x-r*0.3,gp.y-r*0.05,r*0.13,0,7);ctx.arc(gp.x+r*0.3,gp.y-r*0.05,r*0.13,0,7);ctx.fill();
    } else { // 정상/죽음(눈만)
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(gp.x-r*0.35,gp.y-r*0.1,r*0.22,0,7);ctx.arc(gp.x+r*0.35,gp.y-r*0.1,r*0.22,0,7);ctx.fill();
      ctx.fillStyle='#003';ctx.beginPath();ctx.arc(gp.x-r*0.35+g.dir.x*r*0.1,gp.y-r*0.1+g.dir.y*r*0.1,r*0.11,0,7);ctx.arc(gp.x+r*0.35+g.dir.x*r*0.1,gp.y-r*0.1+g.dir.y*r*0.1,r*0.11,0,7);ctx.fill();
    }
  }
  // READY! / 레벨 클리어 안내
  ctx.textAlign='center';ctx.textBaseline='middle';
  if(readyT>0){ ctx.fillStyle='#ffd35f';ctx.font='bold '+(S*0.85)+'px sans-serif';ctx.fillText('READY!',cv.width/2,cv.height*0.63); }
  if(flashT>0&&Math.floor(flashT/6)%2){ ctx.fillStyle='#5fffac';ctx.font='bold '+(S*0.75)+'px sans-serif';ctx.fillText(t('레벨 클리어!','LEVEL CLEAR!'),cv.width/2,cv.height/2); }
}
function loop(){if(state==='play')update();if(cells&&pac)draw();requestAnimationFrame(loop);}
genMaze();dots=Array.from({length:N},()=>Array(N).fill(0));state='menu';
requestAnimationFrame(loop);
</script>
<script src="_controls.js"></script>
<script>
TC.make({ dpad:{keys:{up:'ArrowUp',down:'ArrowDown',left:'ArrowLeft',right:'ArrowRight'}} });
</script>
</body>
