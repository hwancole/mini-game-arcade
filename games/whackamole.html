<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐹 두더지 잡기</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI','Malgun Gothic',sans-serif;
    background:linear-gradient(180deg,#87ceeb,#b3e5a8);color:#333;
    display:flex;flex-direction:column;align-items:center;min-height:100vh;cursor:crosshair;user-select:none}
  .topbar{width:100%;max-width:720px;display:flex;justify-content:space-between;align-items:center;padding:10px 16px}
  .topbar a{color:#c8530a;text-decoration:none;font-weight:bold}
  h1{color:#7a3c00;text-shadow:1px 1px 0 #fff}
  .stats{display:flex;gap:20px;margin:10px;font-size:1.3rem;font-weight:bold;color:#5a2c00;flex-wrap:wrap;justify-content:center}
  .stats .box{background:rgba(255,255,255,.7);padding:6px 16px;border-radius:12px}
  #combo{color:#e0530a}
  .board{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin:14px;padding:20px;
    background:rgba(120,72,20,.25);border-radius:20px}
  .hole{width:130px;height:110px;position:relative;cursor:pointer}
  .dirt{position:absolute;bottom:0;left:0;right:0;height:46px;background:radial-gradient(ellipse at center top,#6b4423,#3d2812);
    border-radius:50%/70% 70% 40% 40%;box-shadow:inset 0 6px 10px rgba(0,0,0,.5)}
  .mole{position:absolute;bottom:8px;left:50%;transform:translateX(-50%) translateY(100%);
    width:88px;height:90px;transition:transform .12s ease-out;font-size:70px;text-align:center;line-height:90px;z-index:1}
  .mole.up{transform:translateX(-50%) translateY(8%)}
  .mole.bonk{animation:bonk .25s}
  @keyframes bonk{0%{transform:translateX(-50%) translateY(8%) scale(1)}100%{transform:translateX(-50%) translateY(80%) scale(.6);opacity:0}}
  .overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(0,0,0,.7);color:#fff;text-align:center;gap:16px;z-index:10}
  .overlay.hidden{display:none}
  .overlay h2{font-size:2.4rem}
  .btn{background:#e0530a;color:#fff;border:none;padding:14px 34px;border-radius:10px;font-size:1.1rem;font-weight:bold;cursor:pointer;transition:.15s}
  .btn:hover{transform:scale(1.06)}
  .btn.alt{background:#555}
  .legend{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;font-size:.95rem;color:#5a2c00;margin:6px}
  .float{position:fixed;pointer-events:none;font-weight:900;font-size:1.4rem;z-index:5;animation:floatUp .8s forwards}
  @keyframes floatUp{to{transform:translateY(-50px);opacity:0}}
  .diffs{display:flex;gap:10px}
  .diffs .d{padding:8px 16px;border:2px solid #fff;border-radius:8px;cursor:pointer;background:rgba(255,255,255,.1)}
  .diffs .d.sel{background:#e0530a;border-color:#e0530a}
  @media (max-width:520px){
    .board{gap:10px;padding:12px;border-radius:14px}
    .hole{width:92px;height:80px}
    .dirt{height:34px}
    .mole{width:64px;height:66px;font-size:50px;line-height:66px;bottom:6px}
    h1{font-size:1.3rem}
    .stats{font-size:1rem;gap:10px}.stats .box{padding:5px 12px}
  }
  @media (max-width:360px){
    .hole{width:78px;height:70px}
    .mole{width:54px;height:58px;font-size:42px;line-height:58px}
  }
</style>
<link rel="stylesheet" href="_arcade.css">
</head>
<body>
<div class="topbar"><a href="../index.html">← 메인으로</a><b>🐹 두더지 잡기</b><span></span></div>
<h1>🔨 두더지를 잡아라!</h1>
<div class="stats">
  <div class="box">⭐ 점수 <span id="score">0</span></div>
  <div class="box">⏱️ <span id="time">30</span>초</div>
  <div class="box">🔥 콤보 <span id="combo">0</span></div>
  <div class="box">🎯 최고 <span id="best">0</span></div>
</div>
<div class="board" id="board"></div>
<div class="legend">
  <span>🐹 일반 +10</span><span>👑 황금 +30</span><span>💣 폭탄 −20 & 콤보 리셋</span>
</div>

<div class="overlay" id="startScreen">
  <h2>🐹 두더지 잡기</h2>
  <p>제한시간 안에 최대한 많은 두더지를 잡으세요!<br>황금 두더지는 보너스, 폭탄은 피하세요. 연속으로 잡으면 콤보 보너스!</p>
  <div class="diffs">
    <div class="d sel" data-d="easy">쉬움</div>
    <div class="d" data-d="normal">보통</div>
    <div class="d" data-d="hard">어려움</div>
  </div>
  <button class="btn" id="startBtn">시작 ▶</button>
</div>
<div class="overlay hidden" id="endScreen">
  <h2 id="endTitle">⏰ 시간 종료!</h2>
  <p id="endStats" style="font-size:1.3rem"></p>
  <div style="display:flex;gap:12px">
    <button class="btn" id="restartBtn">🔄 다시하기</button>
    <a class="btn alt" href="../index.html">메인으로</a>
  </div>
</div>

<script>
const SET={easy:{time:40,up:[900,1500],dur:[1100,1500],bomb:0.08},
           normal:{time:30,up:[650,1100],dur:[800,1200],bomb:0.13},
           hard:{time:25,up:[450,800],dur:[600,950],bomb:0.18}};
let diff='easy';
const boardEl=document.getElementById('board');
const scoreEl=document.getElementById('score'),timeEl=document.getElementById('time'),
      comboEl=document.getElementById('combo'),bestEl=document.getElementById('best');
let holes=[], score, combo, timeLeft, running, spawnTO, timerIv;

document.querySelectorAll('.diffs .d').forEach(d=>d.onclick=()=>{
  document.querySelectorAll('.diffs .d').forEach(x=>x.classList.remove('sel'));d.classList.add('sel');diff=d.dataset.d;
});

function buildBoard(){
  boardEl.innerHTML='';holes=[];
  for(let i=0;i<9;i++){
    const hole=document.createElement('div');hole.className='hole';
    const mole=document.createElement('div');mole.className='mole';
    const dirt=document.createElement('div');dirt.className='dirt';
    hole.appendChild(mole);hole.appendChild(dirt);
    boardEl.appendChild(hole);
    const obj={el:mole,hole,state:'down',type:null,timeout:null};
    mole.addEventListener('mousedown',e=>{e.stopPropagation();whack(obj,e);});
    mole.addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();const t=e.touches[0];whack(obj,{clientX:t.clientX,clientY:t.clientY});},{passive:false});
    holes.push(obj);
  }
}

function showBest(){bestEl.textContent=localStorage.getItem('mole_best_'+diff)||0;}

function startGame(){
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.add('hidden');
  score=0;combo=0;timeLeft=SET[diff].time;running=true;
  scoreEl.textContent=0;comboEl.textContent=0;timeEl.textContent=timeLeft;showBest();
  holes.forEach(h=>setDown(h));
  clearInterval(timerIv);
  timerIv=setInterval(()=>{timeLeft--;timeEl.textContent=timeLeft;if(timeLeft<=0)endGame();},1000);
  scheduleSpawn();
}
function scheduleSpawn(){
  if(!running)return;
  const [a,b]=SET[diff].up;
  spawnTO=setTimeout(()=>{popRandom();scheduleSpawn();},a+Math.random()*(b-a));
}
function popRandom(){
  const down=holes.filter(h=>h.state==='down');
  if(!down.length)return;
  // sometimes pop 2 at once on hard
  const count=(diff==='hard'&&Math.random()<0.4)?2:1;
  for(let k=0;k<count&&down.length;k++){
    const idx=Math.floor(Math.random()*down.length);
    const h=down.splice(idx,1)[0];
    let type='normal';const r=Math.random();
    if(r<SET[diff].bomb)type='bomb';else if(r<SET[diff].bomb+0.15)type='gold';
    h.type=type;h.state='up';
    h.el.textContent=type==='bomb'?'💣':type==='gold'?'👑':'🐹';
    h.el.classList.remove('bonk');h.el.classList.add('up');
    const [da,db]=SET[diff].dur;
    h.timeout=setTimeout(()=>{if(h.state==='up'){if(h.type!=='bomb')combo=0,comboEl.textContent=0;setDown(h);}},da+Math.random()*(db-da));
  }
}
function setDown(h){h.state='down';h.type=null;h.el.classList.remove('up','bonk');clearTimeout(h.timeout);}

function whack(h,e){
  if(!running||h.state!=='up')return;
  const type=h.type;
  h.state='hit';clearTimeout(h.timeout);
  h.el.classList.add('bonk');
  setTimeout(()=>setDown(h),250);
  let pts;
  if(type==='bomb'){pts=-20;combo=0;floatText(e.clientX,e.clientY,'💥 -20','#ff3b3b');}
  else{
    combo++;
    const base=type==='gold'?30:10;
    const bonus=Math.floor(combo/3)*5;
    pts=base+bonus;
    floatText(e.clientX,e.clientY,`+${pts}${combo>=3?' 🔥x'+combo:''}`,type==='gold'?'#ffd700':'#2e7d32');
  }
  score=Math.max(0,score+pts);
  scoreEl.textContent=score;comboEl.textContent=combo;
}
function floatText(x,y,txt,color){
  const d=document.createElement('div');d.className='float';d.textContent=txt;d.style.color=color;
  d.style.left=(x-20)+'px';d.style.top=(y-20)+'px';document.body.appendChild(d);
  setTimeout(()=>d.remove(),800);
}

function endGame(){
  running=false;clearInterval(timerIv);clearTimeout(spawnTO);
  holes.forEach(h=>setDown(h));
  const best=parseInt(localStorage.getItem('mole_best_'+diff)||'0');
  let msg=`최종 점수: <b>${score}</b>`;
  if(score>best){localStorage.setItem('mole_best_'+diff,score);msg+='<br>🎉 새로운 최고 기록!';}
  else msg+=`<br>최고 기록: ${best}`;
  document.getElementById('endStats').innerHTML=msg;
  document.getElementById('endScreen').classList.remove('hidden');
}

document.getElementById('startBtn').onclick=startGame;
document.getElementById('restartBtn').onclick=startGame;
buildBoard();showBest();
</script>
</body>
</html>
