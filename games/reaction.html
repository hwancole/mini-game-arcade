<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚡ 반응속도 테스트</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI','Malgun Gothic',sans-serif;background:#0c1420;color:#eee;
    display:flex;flex-direction:column;align-items:center;min-height:100vh;user-select:none}
  .topbar{width:100%;max-width:640px;display:flex;justify-content:space-between;align-items:center;padding:10px 16px}
  .topbar a{color:#5fffac;text-decoration:none;font-weight:bold}
  h1{margin:8px;color:#5fffac}
  #pad{width:92%;max-width:600px;height:min(60vh,440px);border-radius:18px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;cursor:pointer;text-align:center;padding:20px;
    font-size:1.6rem;font-weight:bold;transition:background .05s;margin:10px}
  .wait{background:#b03030}.ready{background:#2f8f4f}.idle{background:#2a3550}.early{background:#7a5a20}.result{background:#234}
  #pad small{font-size:1rem;font-weight:normal;opacity:.85;margin-top:10px;display:block}
  .stats{display:flex;gap:24px;font-size:1.05rem;font-weight:bold;margin:8px;flex-wrap:wrap;justify-content:center}
  .stats .box{background:rgba(255,255,255,.07);padding:8px 16px;border-radius:10px}
  .hint{color:#9aa;font-size:.85rem;text-align:center;padding:0 16px}
  .runs{display:flex;gap:6px;margin:8px;flex-wrap:wrap;justify-content:center;max-width:600px}
  .runs span{background:rgba(255,255,255,.08);padding:4px 10px;border-radius:8px;font-size:.85rem}
</style>
<link rel="stylesheet" href="_arcade.css">
<script src="_i18n.js"></script>
</head>
<body>
<div class="topbar"><a href="../index.html" data-ko="← 메인으로" data-en="← Main">← 메인으로</a><b data-ko="⚡ 반응속도" data-en="⚡ Reaction">⚡ 반응속도</b><span></span></div>
<h1 data-ko="반응속도 테스트" data-en="Reaction Time Test">반응속도 테스트</h1>
<div id="pad" class="idle"><span data-ko="탭하여 시작" data-en="Tap to Start">탭하여 시작</span><small data-ko="초록색으로 바뀌는 순간 즉시 탭하세요!" data-en="Tap the instant it turns green!">초록색으로 바뀌는 순간 즉시 탭하세요!</small></div>
<div class="stats">
  <div class="box"><span data-ko="마지막 " data-en="Last ">마지막 </span><span id="last">–</span></div>
  <div class="box"><span data-ko="평균 " data-en="Avg ">평균 </span><span id="avg">–</span></div>
  <div class="box"><span data-ko="최고 " data-en="Best ">최고 </span><span id="best">–</span></div>
</div>
<div class="runs" id="runs"></div>
<p class="hint" data-ko="총 5회 측정합니다. 초록불 전에 누르면 실패! 인간 평균은 약 250ms입니다." data-en="5 rounds total. Tapping before green fails! The human average is about 250ms.">총 5회 측정합니다. 초록불 전에 누르면 실패! 인간 평균은 약 250ms입니다.</p>

<script>
const pad=document.getElementById('pad');
const lastEl=document.getElementById('last'),avgEl=document.getElementById('avg'),bestEl=document.getElementById('best'),runsEl=document.getElementById('runs');
let state='idle',startT,timeoutId,times=[];
let best=parseInt(localStorage.getItem('reaction_best')||'0');
if(best)bestEl.textContent=best+'ms';
// ---- 사운드 ----
let acx=null;function AC(){if(!acx){try{acx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return acx;}
function tone(f,f2,d,ty,v,w){const a=AC();if(!a)return;const o=a.createOscillator(),g=a.createGain(),t0=a.currentTime+(w||0);o.type=ty||'square';o.frequency.setValueAtTime(f,t0);if(f2)o.frequency.exponentialRampToValueAtTime(Math.max(20,f2),t0+d);g.gain.setValueAtTime(v||0.08,t0);g.gain.exponentialRampToValueAtTime(0.0008,t0+d);o.connect(g);g.connect(a.destination);o.start(t0);o.stop(t0+d);}
function sfx(x){if(x==='go')tone(660,990,0.12,'square',0.1);else if(x==='tap')tone(900,1320,0.1,'square',0.07);else if(x==='early')tone(200,70,0.25,'sawtooth',0.1);else if(x==='finish')[523,659,784,1047].forEach((f,i)=>tone(f,f,0.13,'square',0.09,i*0.1));}

function setPad(cls,main,sub){pad.className=cls;pad.innerHTML=main+(sub?`<small>${sub}</small>`:'');}

function begin(){
  AC();times=[];runsEl.innerHTML='';next();
}
function next(){
  if(times.length>=5){finish();return;}
  state='wait';setPad('wait',t('준비...','Ready...'),t('초록색이 되면 탭!','Tap when green!'));
  const delay=900+Math.random()*2600;
  timeoutId=setTimeout(()=>{state='ready';startT=performance.now();setPad('ready',t('지금 탭!','Tap now!'),'');sfx('go');},delay);
}
function finish(){
  const avg=Math.round(times.reduce((a,b)=>a+b,0)/times.length);
  const bestRun=Math.min(...times);
  if(!best||bestRun<best){best=bestRun;localStorage.setItem('reaction_best',best);}
  bestEl.textContent=best+'ms';avgEl.textContent=avg+'ms';sfx('finish');
  const rating=avg<250?t('⚡ 번개 같아요!','⚡ Lightning!'):avg<350?t('👍 훌륭해요!','👍 Great!'):avg<450?t('🙂 평균이에요','🙂 Average'):t('🐢 조금 느려요','🐢 A bit slow');
  state='idle';setPad('result',t(`완료! 평균 ${avg}ms`,`Done! Avg ${avg}ms`),rating+' · '+t('탭하여 다시','Tap to retry'));
}
function tap(){
  if(state==='idle'||state==='result'){begin();return;}
  if(state==='wait'){ // too early
    clearTimeout(timeoutId);state='early';setPad('early',t('너무 빨라요! 😅','Too early! 😅'),t('탭하여 계속','Tap to continue'));sfx('early');
    state='idle';return;
  }
  if(state==='ready'){
    sfx('tap');
    const t=Math.round(performance.now()-startT);
    times.push(t);lastEl.textContent=t+'ms';
    const s=document.createElement('span');s.textContent=`#${times.length}: ${t}ms`;runsEl.appendChild(s);
    state='between';setPad('idle',`${t}ms 👍`,window.t('탭하여 다음','Tap for next'));
    return;
  }
  if(state==='between'){next();}
}
pad.addEventListener('mousedown',e=>{e.preventDefault();tap();});
pad.addEventListener('touchstart',e=>{e.preventDefault();tap();},{passive:false});
addEventListener('keydown',e=>{if(e.key===' '){e.preventDefault();tap();}});
</script>
</body>
</html>
