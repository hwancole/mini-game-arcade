<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚫ 오목</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI','Malgun Gothic',sans-serif;background:#1a1410;color:#eee;
    display:flex;flex-direction:column;align-items:center;min-height:100vh;user-select:none}
  .topbar{width:100%;max-width:620px;display:flex;justify-content:space-between;align-items:center;padding:10px 16px}
  .topbar a{color:#d9a86a;text-decoration:none;font-weight:bold}
  #status{font-size:1.1rem;font-weight:bold;margin:6px;height:26px}
  #wrap{position:relative}
  canvas{background:#e3b878;border-radius:6px;display:block;touch-action:none;box-shadow:0 6px 20px rgba(0,0,0,.5)}
  .toolbar{display:flex;gap:8px;margin:10px;flex-wrap:wrap;justify-content:center}
  .btn{background:#d9a86a;color:#2a1d0e;border:none;padding:9px 18px;border-radius:8px;font-weight:bold;cursor:pointer}
  .btn.alt{background:#3a2f22;color:#eee}
  .btn:disabled{opacity:.4;cursor:default}
  .overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(12,8,4,.92);text-align:center;gap:14px;z-index:10;padding:20px}
  .overlay.hidden{display:none}.overlay h2{color:#d9a86a;font-size:2rem}
  .opts{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .opt{padding:10px 18px;border:2px solid #555;border-radius:10px;cursor:pointer;font-weight:bold;color:#eee}
  .opt.sel{border-color:#d9a86a;background:rgba(217,168,106,.2)}
  .diffs{display:flex;gap:8px}
  .record{font-size:.84rem;color:#9aa;margin:4px;text-align:center;line-height:1.6}
  .hint{font-size:.8rem;color:#778;text-align:center;padding:0 16px}
</style>
<link rel="stylesheet" href="_arcade.css">
<script src="_i18n.js"></script>
</head>
<body>
<div class="topbar"><a href="../index.html">← 메인으로</a><b>⚫ 오목 (Gomoku)</b><span></span></div>
<div id="status">●</div>
<div id="wrap"><canvas id="cv" width="600" height="600"></canvas></div>
<div class="toolbar">
  <button class="btn" id="undoBtn">↩ 무르기</button>
  <button class="btn alt" id="hintBtn" data-ko="💡 힌트" data-en="💡 Hint">💡 힌트</button>
  <button class="btn alt" id="newBtn">🔄 새 게임</button>
  <button class="btn alt" id="menuBtn">⚙️ 모드 변경</button>
</div>
<div class="record" id="record"></div>
<p class="hint" id="rulesHint">20×20 · 가로·세로·대각선 <b>5목</b>이면 승리 · 흑 선공 · 모바일은 교차점을 탭하세요 (기본 오목 규칙, 쌍삼 허용)</p>

<div class="overlay" id="startScreen">
  <h2 data-ko="⚫ 오목" data-en="⚫ Gomoku">⚫ 오목</h2>
  <div class="opts" id="modeOpts">
    <div class="opt sel" data-mode="ai">🤖 AI 대전</div>
    <div class="opt" data-mode="2p">👥 2인 플레이</div>
  </div>
  <div id="diffWrap">
    <div style="color:#9aa;font-size:.85rem;margin-bottom:6px" data-ko="난이도" data-en="Difficulty">난이도</div>
    <div class="diffs">
      <div class="opt sel" data-diff="easy">쉬움</div>
      <div class="opt" data-diff="normal">보통</div>
      <div class="opt" data-diff="hard">어려움</div>
    </div>
  </div>
  <button class="btn" id="startBtn" style="margin-top:6px;padding:12px 30px">시작 ▶</button>
  <div class="record" id="recordMenu"></div>
</div>
<div class="overlay hidden" id="endScreen">
  <h2 id="endTitle"></h2>
  <button class="btn alt" id="reviewBtn">🔍 바둑판 다시 보기</button>
  <button class="btn" id="againBtn">🔄 다시</button>
  <button class="btn alt" id="endMenuBtn">모드 변경</button>
  <a class="btn alt" href="../index.html">🏠 홈으로</a>
</div>

<script>
const N=20, cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const MARGIN=20, CELL=(cv.width-MARGIN*2)/(N-1), R=CELL*0.42;
let board, turn, mode='ai', diff='easy', history, state, winLine=null, thinking=false;
const statusEl=document.getElementById('status');
document.getElementById('rulesHint').innerHTML=t('20×20 · 가로·세로·대각선 <b>5목</b>이면 승리 · 흑 선공 · 💡힌트로 추천 수 · 모바일은 교차점을 탭 (쌍삼 허용)','20×20 · Get <b>5 in a row</b> to win · Black first · 💡Hint suggests a move · tap an intersection on mobile (double-three allowed)');

let popAnim=null, hoverCell=null, hintCell=null, animRunning=false;
function easeBack(p){const c=1.7;return 1+(c+1)*Math.pow(p-1,3)+c*Math.pow(p-1,2);}
// ---- 사운드 (WebAudio) ----
let acx=null;
function AC(){if(!acx){try{acx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return acx;}
function tone(f,f2,dur,type,vol,when){const a=AC();if(!a)return;const o=a.createOscillator(),g=a.createGain(),t0=a.currentTime+(when||0);
  o.type=type||'square';o.frequency.setValueAtTime(f,t0);if(f2)o.frequency.exponentialRampToValueAtTime(Math.max(20,f2),t0+dur);
  g.gain.setValueAtTime(vol||0.07,t0);g.gain.exponentialRampToValueAtTime(0.0008,t0+dur);o.connect(g);g.connect(a.destination);o.start(t0);o.stop(t0+dur);}
function sfx(type){switch(type){
  case 'black': tone(300,210,0.07,'square',0.07); break;
  case 'white': tone(360,260,0.07,'square',0.06); break;
  case 'win': [523,659,784,1047].forEach((f,i)=>tone(f,f,0.14,'square',0.1,i*0.1)); break;
  case 'lose': [392,330,262,196].forEach((f,i)=>tone(f,f,0.2,'sawtooth',0.11,i*0.13)); break;
  case 'draw': tone(440,440,0.2,'sine',0.08); break;
  case 'undo': tone(220,320,0.08,'triangle',0.06); break;
}}
function ensureAnim(){ if(!animRunning){animRunning=true;requestAnimationFrame(animLoop);} }
function animLoop(){
  if(hintCell&&performance.now()-hintCell.t>4000)hintCell=null;   // 힌트 4초 후 사라짐
  draw();
  const popActive = popAnim && (performance.now()-popAnim.t<200);
  const endHidden = document.getElementById('endScreen').classList.contains('hidden');
  const winPulse = state==='over' && winLine && endHidden;
  if(popActive||winPulse||hoverCell||hintCell){ requestAnimationFrame(animLoop); }
  else { animRunning=false; draw(); }
}

// ---- 화면/메뉴 ----
document.querySelectorAll('#modeOpts .opt').forEach(o=>o.onclick=()=>{
  document.querySelectorAll('#modeOpts .opt').forEach(x=>x.classList.remove('sel'));o.classList.add('sel');mode=o.dataset.mode;
  document.getElementById('diffWrap').style.display = mode==='ai'?'block':'none';});
document.querySelectorAll('.diffs .opt').forEach(o=>o.onclick=()=>{
  document.querySelectorAll('.diffs .opt').forEach(x=>x.classList.remove('sel'));o.classList.add('sel');diff=o.dataset.diff;});
document.getElementById('startBtn').onclick=startGame;
document.getElementById('newBtn').onclick=startGame;
document.getElementById('againBtn').onclick=startGame;
document.getElementById('menuBtn').onclick=showMenu;
document.getElementById('endMenuBtn').onclick=showMenu;
document.getElementById('undoBtn').onclick=undo;
document.getElementById('hintBtn').onclick=hint;

function showMenu(){state='menu';clearFloat();document.getElementById('startScreen').classList.remove('hidden');document.getElementById('endScreen').classList.add('hidden');showRecord();}

function startGame(){
  board=Array.from({length:N},()=>Array(N).fill(0));
  clearFloat(); AC();
  turn=1; history=[]; winLine=null; state='play'; thinking=false;
  popAnim=null; hintCell=null; hoverCell=null;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.add('hidden');
  updateStatus(); draw();
}
function updateStatus(){
  if(thinking){statusEl.innerHTML=t('🤖 AI가 생각 중...','🤖 AI is thinking...');return;}
  const who=turn===1?t('⚫ 흑','⚫ Black'):t('⚪ 백','⚪ White');
  let label=who+t(' 차례',' to move');
  if(mode==='ai')label += turn===1?t(' (당신)',' (You)'):' (AI)';
  statusEl.textContent=label;
}

// ---- 전적 ----
function loadRec(){try{return JSON.parse(localStorage.getItem('gomoku_record'))||{};}catch(e){return {};}}
function showRecord(){
  const r=loadRec(); const fmt=d=>{const x=r[d]||{w:0,l:0};const dn=d==='easy'?t('쉬움','Easy'):d==='normal'?t('보통','Normal'):t('어려움','Hard');return t(`${dn} ${x.w}승 ${x.l}패`,`${dn} ${x.w}W ${x.l}L`);};
  const txt=t(`📊 AI전 전적 · ${fmt('easy')} · ${fmt('normal')} · ${fmt('hard')}`,`📊 vs AI · ${fmt('easy')} · ${fmt('normal')} · ${fmt('hard')}`);
  document.getElementById('record').textContent=txt;
  document.getElementById('recordMenu').textContent=txt;
}

// ---- 입력 ----
function place(x,y){
  if(state!=='play'||thinking||board[y][x]!==0)return;
  sfx(turn===1?'black':'white');
  board[y][x]=turn; history.push([x,y,turn]);
  popAnim={x,y,t:performance.now()}; hintCell=null;
  const win=checkWin(x,y,turn);
  ensureAnim();
  if(win){endGame(turn);return;}
  if(history.length===N*N){endGame(0);return;}
  turn=3-turn; updateStatus();
  if(mode==='ai'&&turn===2){ aiTurn(); }
}
cv.addEventListener('click',e=>{const p=toCell(e.clientX,e.clientY);if(p)userPlace(p);});
cv.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];const p=toCell(t.clientX,t.clientY);if(p)userPlace(p);},{passive:false});
// 데스크톱 호버 미리보기
cv.addEventListener('mousemove',e=>{
  if(state!=='play'||thinking||(mode==='ai'&&turn!==1)){ if(hoverCell){hoverCell=null;ensureAnim();} return; }
  const p=toCell(e.clientX,e.clientY); const nc=(p&&board[p.y][p.x]===0)?p:null;
  if((nc&&(!hoverCell||hoverCell.x!==nc.x||hoverCell.y!==nc.y))||(!nc&&hoverCell)){ hoverCell=nc; ensureAnim(); }
});
cv.addEventListener('mouseleave',()=>{ if(hoverCell){hoverCell=null;ensureAnim();} });
function userPlace(p){ if(mode==='ai'&&turn!==1)return; place(p.x,p.y); }
function hint(){
  if(state!=='play'||thinking||(mode==='ai'&&turn!==1))return;
  AC(); const mv=findBestMove(turn,'normal');
  if(mv){ hintCell={x:mv[0],y:mv[1],t:performance.now()}; ensureAnim(); }
}
function toCell(cx,cy){
  const r=cv.getBoundingClientRect();
  const x=(cx-r.left)*(cv.width/r.width), y=(cy-r.top)*(cv.height/r.height);
  const gx=Math.round((x-MARGIN)/CELL), gy=Math.round((y-MARGIN)/CELL);
  if(gx<0||gx>=N||gy<0||gy>=N)return null;
  // 탭 허용 오차
  if(Math.hypot(x-(MARGIN+gx*CELL),y-(MARGIN+gy*CELL))>CELL*0.6)return null;
  return {x:gx,y:gy};
}
function undo(){
  if(state!=='play'||thinking||history.length===0)return;
  const steps=(mode==='ai'&&history.length>=2)?2:1; // AI전은 내수+AI수 함께 취소
  for(let i=0;i<steps&&history.length;i++){const [x,y]=history.pop();board[y][x]=0;}
  sfx('undo'); popAnim=null; hintCell=null;
  turn=(mode==='ai')?1:3-turn; winLine=null; updateStatus(); draw();
}

// ---- 승리 판정 ----
const DIRS=[[1,0],[0,1],[1,1],[1,-1]];
function checkWin(x,y,p){
  for(const [dx,dy] of DIRS){
    const cells=[[x,y]];
    for(const s of [1,-1]){let nx=x+dx*s,ny=y+dy*s;while(inb(nx,ny)&&board[ny][nx]===p){cells.push([nx,ny]);nx+=dx*s;ny+=dy*s;}}
    if(cells.length>=5){winLine=cells;return true;}
  }
  return false;
}
function inb(x,y){return x>=0&&x<N&&y>=0&&y<N;}

let pendingEndTitle='';
function endGame(winner){
  state='over';
  let title;
  if(winner===0){title=t('무승부!','Draw!');sfx('draw');}
  else if(mode==='ai'){
    const youWin=winner===1; title=youWin?t('🏆 승리!','🏆 You win!'):t('😢 패배 — 어디서 5목을 내줬는지 확인해보세요','😢 You lose — review where the five-in-a-row was made');
    sfx(youWin?'win':'lose');
    const r=loadRec(); r[diff]=r[diff]||{w:0,l:0}; if(youWin)r[diff].w++;else r[diff].l++;
    localStorage.setItem('gomoku_record',JSON.stringify(r));
  } else {title=(winner===1?t('⚫ 흑','⚫ Black'):t('⚪ 백','⚪ White'))+t(' 승리!',' wins!');sfx('win');}
  pendingEndTitle=title;
  showRecord();
  // 1.8초간 바둑판(승리 줄 강조)을 먼저 보여준 뒤 결과 표시
  setTimeout(showEndScreen,1800);
}
function showEndScreen(){
  if(state!=='over')return;
  document.getElementById('endTitle').textContent=pendingEndTitle;
  document.getElementById('endScreen').classList.remove('hidden');
}
function clearFloat(){const f=document.getElementById('floatReview');if(f)f.remove();}
document.getElementById('reviewBtn').onclick=()=>{
  document.getElementById('endScreen').classList.add('hidden');
  if(document.getElementById('floatReview'))return;
  const b=document.createElement('button');b.id='floatReview';b.textContent=t('📋 결과 다시 보기','📋 Show Result');
  b.style.cssText='position:fixed;bottom:calc(16px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:30;background:#d9a86a;color:#2a1d0e;border:none;padding:12px 24px;border-radius:24px;font-weight:bold;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.5)';
  b.onclick=()=>{document.getElementById('endScreen').classList.remove('hidden');b.remove();};
  document.body.appendChild(b);
};

// ================= AI (미니맥스 + 알파베타) =================
function aiTurn(){
  thinking=true; updateStatus();
  setTimeout(()=>{ // UI가 "생각 중"을 먼저 그리도록
    const mv=findBestMove(2, diff);
    thinking=false;
    if(mv) place(mv[0],mv[1]); else updateStatus();
  },60);
}
// 한 칸에 player를 놓았을 때 만들어지는 위협 점수
function runValue(len,open){
  if(len>=5)return 1e8;
  if(len===4)return open===2?1e6:open===1?1e4:0;
  if(len===3)return open===2?1e4:open===1?1e3:0;
  if(len===2)return open===2?1e2:open===1?10:0;
  if(len===1)return open===2?2:0;
  return 0;
}
function cellGain(x,y,p){
  let s=0;
  for(const [dx,dy] of DIRS){
    let len=1, openA=0, openB=0;
    let fx=x+dx,fy=y+dy,f=0; while(inb(fx,fy)&&board[fy][fx]===p){f++;fx+=dx;fy+=dy;} openA=(inb(fx,fy)&&board[fy][fx]===0)?1:0;
    let bx=x-dx,by=y-dy,b=0; while(inb(bx,by)&&board[by][bx]===p){b++;bx-=dx;by-=dy;} openB=(inb(bx,by)&&board[by][bx]===0)?1:0;
    s+=runValue(1+f+b, openA+openB);
  }
  return s;
}
function isWinAt(x,y,p){
  for(const [dx,dy] of DIRS){let c=1;
    for(const s of [1,-1]){let nx=x+dx*s,ny=y+dy*s;while(inb(nx,ny)&&board[ny][nx]===p){c++;nx+=dx*s;ny+=dy*s;}}
    if(c>=5)return true;}
  return false;
}
// 보드 전체 평가 (라인 기반)
function lineScore(p){
  let score=0;
  for(const [dx,dy] of DIRS)for(let y=0;y<N;y++)for(let x=0;x<N;x++){
    const px=x-dx,py=y-dy;
    if(inb(px,py)&&board[py][px]===p)continue;     // 런 시작점만
    if(board[y][x]!==p)continue;
    let len=0,cx=x,cy=y; while(inb(cx,cy)&&board[cy][cx]===p){len++;cx+=dx;cy+=dy;}
    const beforeOpen=inb(px,py)&&board[py][px]===0, afterOpen=inb(cx,cy)&&board[cy][cx]===0;
    score+=runValue(len,(beforeOpen?1:0)+(afterOpen?1:0));
  }
  return score;
}
function evaluate(ai,opp){ return lineScore(ai) - lineScore(opp)*1.15; }

function candidates(){
  const seen=new Set(), out=[];
  let any=false;
  for(let y=0;y<N;y++)for(let x=0;x<N;x++)if(board[y][x]){any=true;
    for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++){
      const nx=x+dx,ny=y+dy; if(inb(nx,ny)&&board[ny][nx]===0){const k=ny*N+nx;if(!seen.has(k)){seen.add(k);out.push([nx,ny]);}}
    }}
  if(!any)return [[N>>1,N>>1]];
  return out;
}
function topCandidates(K,ai,opp){
  const c=candidates();
  for(const cand of c) cand.score=cellGain(cand[0],cand[1],ai)+cellGain(cand[0],cand[1],opp)*0.9;
  c.sort((a,b)=>b.score-a.score);
  return c.slice(0,K);
}
let deadline=0;
function minimax(depth,alpha,beta,maxing,ai,opp,K){
  if(depth===0||performance.now()>deadline)return evaluate(ai,opp);
  const cands=topCandidates(K,ai,opp);
  if(!cands.length)return evaluate(ai,opp);
  if(maxing){
    let best=-Infinity;
    for(const [x,y] of cands){
      board[y][x]=ai; const win=isWinAt(x,y,ai);
      const v=win?1e9-(10-depth):minimax(depth-1,alpha,beta,false,ai,opp,K);
      board[y][x]=0;
      if(v>best)best=v; if(best>alpha)alpha=best; if(alpha>=beta)break;
    }
    return best;
  } else {
    let best=Infinity;
    for(const [x,y] of cands){
      board[y][x]=opp; const win=isWinAt(x,y,opp);
      const v=win?-1e9+(10-depth):minimax(depth-1,alpha,beta,true,ai,opp,K);
      board[y][x]=0;
      if(v<best)best=v; if(best<beta)beta=best; if(alpha>=beta)break;
    }
    return best;
  }
}
function findBestMove(ai,difficulty){
  const opp=3-ai;
  const cfg={easy:{depth:1,K:10},normal:{depth:2,K:12},hard:{depth:4,K:10}}[difficulty];
  deadline=performance.now()+(difficulty==='hard'?900:500);
  // 1) 즉시 승리
  for(const [x,y] of candidates()){board[y][x]=ai;const w=isWinAt(x,y,ai);board[y][x]=0;if(w)return [x,y];}
  // 2) 상대 즉시 승리 차단
  let block=null,blockScore=-1;
  for(const [x,y] of candidates()){board[y][x]=opp;const w=isWinAt(x,y,opp);board[y][x]=0;
    if(w){const sc=cellGain(x,y,opp);if(sc>blockScore){blockScore=sc;block=[x,y];}}}
  if(block)return block;
  // 3) 탐색
  const cands=topCandidates(cfg.K,ai,opp);
  let best=cands[0]||[N>>1,N>>1], bestVal=-Infinity;
  // 쉬움: 약하게 (상위 후보 중 무작위 가미)
  if(difficulty==='easy'){
    const pool=cands.slice(0,Math.min(4,cands.length));
    return pool[Math.floor(Math.random()*pool.length)];
  }
  for(const [x,y] of cands){
    board[y][x]=ai; const win=isWinAt(x,y,ai);
    const v=win?1e9:minimax(cfg.depth-1,-Infinity,Infinity,false,ai,opp,cfg.K);
    board[y][x]=0;
    if(v>bestVal){bestVal=v;best=[x,y];}
  }
  return best;
}

// ---- 렌더링 ----
function draw(){
  ctx.fillStyle='#e3b878';ctx.fillRect(0,0,cv.width,cv.height);
  ctx.strokeStyle='#6b4a23';ctx.lineWidth=1;
  for(let i=0;i<N;i++){
    ctx.beginPath();ctx.moveTo(MARGIN+i*CELL,MARGIN);ctx.lineTo(MARGIN+i*CELL,cv.height-MARGIN);ctx.stroke();
    ctx.beginPath();ctx.moveTo(MARGIN,MARGIN+i*CELL);ctx.lineTo(cv.width-MARGIN,MARGIN+i*CELL);ctx.stroke();
  }
  // 화점
  ctx.fillStyle='#6b4a23';[[3,3],[3,N-4],[N-4,3],[N-4,N-4],[(N>>1),(N>>1)]].forEach(([gx,gy])=>{
    ctx.beginPath();ctx.arc(MARGIN+gx*CELL,MARGIN+gy*CELL,3,0,7);ctx.fill();});
  // 돌 (마지막 수는 팝인 애니메이션)
  const now=performance.now();
  for(let y=0;y<N;y++)for(let x=0;x<N;x++)if(board[y][x]){
    let sc=1; if(popAnim&&popAnim.x===x&&popAnim.y===y){const pr=Math.min(1,(now-popAnim.t)/150);sc=easeBack(pr);}
    drawStone(x,y,board[y][x],sc);
  }
  // 호버 미리보기(데스크톱)
  if(hoverCell&&state==='play'&&!thinking&&board[hoverCell.y][hoverCell.x]===0){ ctx.globalAlpha=0.4; drawStone(hoverCell.x,hoverCell.y,turn,1); ctx.globalAlpha=1; }
  // 마지막 수 강조
  if(history.length){const [lx,ly]=history[history.length-1];
    ctx.strokeStyle='#ff3b3b';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(MARGIN+lx*CELL,MARGIN+ly*CELL,R*0.5,0,7);ctx.stroke();}
  // 힌트 마커
  if(hintCell){const cx=MARGIN+hintCell.x*CELL,cy=MARGIN+hintCell.y*CELL,pulse=0.5+0.5*Math.sin(now/180);
    ctx.strokeStyle='rgba(90,160,255,'+(0.4+0.5*pulse)+')';ctx.lineWidth=3;ctx.beginPath();ctx.arc(cx,cy,R*0.85,0,7);ctx.stroke();}
  // 승리 라인(펄스)
  if(winLine){const pulse=0.6+0.4*Math.sin(now/150);ctx.strokeStyle='rgba(34,255,136,'+pulse+')';ctx.lineWidth=4+pulse*3;ctx.lineCap='round';
    const a=winLine[0],b=winLine[winLine.length-1];
    ctx.beginPath();ctx.moveTo(MARGIN+a[0]*CELL,MARGIN+a[1]*CELL);ctx.lineTo(MARGIN+b[0]*CELL,MARGIN+b[1]*CELL);ctx.stroke();}
}
function drawStone(x,y,p,scale){
  scale=scale||1; const cx=MARGIN+x*CELL, cy=MARGIN+y*CELL, r=R*scale;
  const g=ctx.createRadialGradient(cx-r*0.3,cy-r*0.3,r*0.1,cx,cy,r);
  if(p===1){g.addColorStop(0,'#555');g.addColorStop(1,'#000');}else{g.addColorStop(0,'#fff');g.addColorStop(1,'#bbb');}
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r,0,7);ctx.fill();
}
showMenu();
</script>
