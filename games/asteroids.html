<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☄️ 소행성</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI','Malgun Gothic',sans-serif;background:#05050c;color:#eee;
    display:flex;flex-direction:column;align-items:center;min-height:100vh}
  .topbar{width:100%;max-width:720px;display:flex;justify-content:space-between;align-items:center;padding:10px 16px}
  .topbar a{color:#aef;text-decoration:none;font-weight:bold}
  .stats{display:flex;gap:24px;margin:6px;font-size:1.1rem;font-weight:bold}
  #wrap{position:relative}
  canvas{background:#05050c;border:2px solid #1a1a3e;border-radius:8px;display:block}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(3,3,8,.9);border-radius:8px;text-align:center;padding:20px;gap:14px}
  .overlay.hidden{display:none}
  .overlay h2{font-size:2rem;color:#aef}
  .btn{background:#5f9fff;color:#fff;border:none;padding:12px 26px;border-radius:8px;font-weight:bold;cursor:pointer;transition:.15s}
  .btn:hover{transform:scale(1.05)}
  .hint{color:#9aa;font-size:.85rem;line-height:1.7}
  kbd{background:#222;border:1px solid #444;border-radius:4px;padding:1px 6px}
</style>
<link rel="stylesheet" href="_arcade.css">
<script src="_i18n.js"></script>
</head>
<body>
<div class="topbar"><a href="../index.html">← 메인으로</a><b>☄️ 소행성</b><span></span></div>
<div class="stats"><span>⭐ <span id="score">0</span></span><span>❤️ <span id="lives">3</span></span><span>🌊 <span id="wave">1</span></span><span>🏆 <span id="best">0</span></span></div>
<div id="wrap">
  <canvas id="cv" width="720" height="540"></canvas>
  <div class="overlay" id="startScreen">
    <h2 data-ko="소행성 (Asteroids)" data-en="Asteroids">소행성 (Asteroids)</h2>
    <p class="hint" data-ko="소행성을 모두 파괴! 큰 것은 부서져 작아집니다. 🛸UFO(고웨이브엔 정밀조준 소형도)를 맞히면 파워업(실드·3연발·연사)이 나와요. 3000·7000점에 추가 목숨!" data-en="Destroy all asteroids! Big ones split into smaller ones. Hit a 🛸UFO (a small precise one appears at higher waves) for a power-up (shield/triple/rapid). Extra life at 3000 & 7000!">소행성을 모두 파괴! 큰 것은 부서져 작아집니다. 🛸UFO(고웨이브엔 정밀조준 소형도)를 맞히면 파워업(실드·3연발·연사)이 나와요. 3000·7000점에 추가 목숨!</p>
    <button class="btn" id="startBtn" data-ko="시작 ▶" data-en="Start ▶">시작 ▶</button>
    <p class="hint"><kbd>←→</kbd> <span data-ko="회전" data-en="Rotate">회전</span> · <kbd>↑</kbd> <span data-ko="추진" data-en="Thrust">추진</span> · <kbd>Space</kbd> <span data-ko="발사" data-en="Fire">발사</span> · <kbd>Shift</kbd> <span data-ko="하이퍼점프" data-en="Hyperjump">하이퍼점프</span></p>
  </div>
  <div class="overlay hidden" id="endScreen">
    <h2 data-ko="게임 오버" data-en="Game Over">게임 오버</h2>
    <p class="hint" id="endStats"></p>
    <button class="btn" id="restartBtn">🔄 재시작</button>
    <a class="btn alt" href="../index.html">🏠 홈으로</a>
  </div>
</div>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
const scoreEl=document.getElementById('score'),livesEl=document.getElementById('lives'),waveEl=document.getElementById('wave'),bestEl=document.getElementById('best');
let ship,rocks,bullets,particles,ufo,ufoBullets,score,lives,wave,state,invuln,ufoT;
best=parseInt(localStorage.getItem('asteroids_best')||'0');bestEl.textContent=best;
let shake=0, pops=[], powerups=[], debris=[], extraGiven=0;
function addShake(n){shake=Math.min(16,shake+n);}
function popText(x,y,txt,col){pops.push({x,y,txt,col:col||'#fff',life:50});}
function spawnDebris(){ for(let i=0;i<5;i++){const a=Math.random()*7;debris.push({x:ship.x,y:ship.y,vx:Math.cos(a)*(1+Math.random()*2),vy:Math.sin(a)*(1+Math.random()*2),a:Math.random()*7,va:(Math.random()-.5)*0.2,len:8+Math.random()*8,life:50});} }
function powerName(k){return k==='rapid'?t('연사!','RAPID!'):k==='triple'?t('3연발!','TRIPLE!'):t('실드!','SHIELD!');}

// ---- 사운드 (WebAudio) ----
let aud=null, engine=null, engGain=null;
function actx(){ if(!aud){ try{ aud=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return aud; }
function tone(f,f2,dur,type,vol,when){ const a=actx(); if(!a)return; const o=a.createOscillator(),g=a.createGain(),t0=a.currentTime+(when||0);
  o.type=type||'square'; o.frequency.setValueAtTime(f,t0); if(f2)o.frequency.exponentialRampToValueAtTime(Math.max(20,f2),t0+dur);
  g.gain.setValueAtTime(vol||0.08,t0); g.gain.exponentialRampToValueAtTime(0.0008,t0+dur); o.connect(g); g.connect(a.destination); o.start(t0); o.stop(t0+dur); }
function noise(dur,vol){ const a=actx(); if(!a)return; const n=a.sampleRate*dur|0,buf=a.createBuffer(1,n,a.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/n,2); const s=a.createBufferSource();s.buffer=buf;const g=a.createGain();g.gain.value=vol||0.12;s.connect(g);g.connect(a.destination);s.start(); }
function sfx(type){ switch(type){
  case 'shoot': tone(900,520,0.08,'square',0.05); break;
  case 'big': tone(150,40,0.3,'sawtooth',0.14); noise(0.26,0.14); break;
  case 'med': tone(230,60,0.22,'sawtooth',0.12); noise(0.18,0.12); break;
  case 'small': tone(330,90,0.16,'square',0.1); noise(0.12,0.1); break;
  case 'ufo': tone(600,900,0.1,'triangle',0.08); tone(900,600,0.1,'triangle',0.08,0.1); break;
  case 'ufohit': tone(1000,300,0.2,'square',0.12); break;
  case 'death': tone(220,40,0.5,'sawtooth',0.16); noise(0.4,0.16); break;
  case 'hyper': tone(1200,200,0.25,'sine',0.1); break;
  case 'catch': tone(660,990,0.12,'square',0.1); tone(990,1320,0.1,'square',0.1,0.1); break;
  case 'wave': [392,523,659].forEach((f,i)=>tone(f,f,0.1,'square',0.1,i*0.08)); break;
  case 'extralife': tone(784,1175,0.22,'square',0.12); break;
} }
function startEngine(){ const a=actx(); if(!a||engine)return; engine=a.createOscillator(); engGain=a.createGain();
  engine.type='sawtooth'; engine.frequency.value=48; engGain.gain.value=0; engine.connect(engGain); engGain.connect(a.destination); engine.start(); }
function stopEngine(){ if(engine){ try{engine.stop();}catch(e){} engine=null; engGain=null; } }
function updateEngine(){ if(!engine||!aud)return; engGain.gain.setTargetAtTime(ship&&ship.thrust&&state==='play'?0.05:0,aud.currentTime,0.05); }

function wrap(o){if(o.x<0)o.x+=W;if(o.x>W)o.x-=W;if(o.y<0)o.y+=H;if(o.y>H)o.y-=H;}

function makeRock(x,y,size){
  const verts=[];const n=9+Math.floor(Math.random()*4);
  for(let i=0;i<n;i++)verts.push(0.7+Math.random()*0.5);
  const a=Math.random()*7,sp=(3-size)*0.5+Math.random()*0.6;
  return {x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,size,r:[0,18,30,46][size],verts,rot:Math.random()*7,vr:(Math.random()-.5)*0.04};
}
function spawnWave(){
  rocks=[];const n=2+wave;
  for(let i=0;i<n;i++){
    let x,y;do{x=Math.random()*W;y=Math.random()*H;}while(Math.hypot(x-ship.x,y-ship.y)<150);
    rocks.push(makeRock(x,y,3));
  }
}
function start(){
  ship={x:W/2,y:H/2,a:-Math.PI/2,vx:0,vy:0,r:12,thrust:false,cool:0,shield:false,power:null,powerT:0};
  bullets=[];particles=[];ufo=null;ufoBullets=[];pops=[];powerups=[];debris=[];shake=0;extraGiven=0;
  score=0;lives=3;wave=1;invuln=90;ufoT=900+Math.random()*600;
  scoreEl.textContent=0;livesEl.textContent=3;waveEl.textContent=1;
  spawnWave();state='play';actx();startEngine();
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.add('hidden');
}
document.getElementById('startBtn').onclick=start;
document.getElementById('restartBtn').onclick=start;

let keys={};
addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  if(e.key===' '){fire();e.preventDefault();}
  if(e.key==='Shift')hyper();
  if(['arrowup','arrowleft','arrowright'].includes(e.key.toLowerCase()))e.preventDefault();
});
addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

function fire(){if(state!=='play'||ship.cool>0)return;
  ship.cool=ship.power==='rapid'?5:10;
  const shots=ship.power==='triple'?[-0.2,0,0.2]:[0];
  for(const off of shots){const a=ship.a+off;
    bullets.push({x:ship.x+Math.cos(a)*14,y:ship.y+Math.sin(a)*14,vx:Math.cos(a)*8+ship.vx,vy:Math.sin(a)*8+ship.vy,life:55});}
  sfx('shoot');}
function hyper(){if(state!=='play')return;ship.x=Math.random()*W;ship.y=Math.random()*H;ship.vx=ship.vy=0;invuln=40;sfx('hyper');}
function boom(x,y,col,n){for(let i=0;i<n;i++){const a=Math.random()*7;particles.push({x,y,vx:Math.cos(a)*Math.random()*3,vy:Math.sin(a)*Math.random()*3,life:25+Math.random()*15,col});}}

function splitRock(rk){
  score+=[0,100,50,20][rk.size];scoreEl.textContent=score;
  boom(rk.x,rk.y,'#aef',rk.size*4);
  sfx(rk.size===3?'big':rk.size===2?'med':'small'); addShake(rk.size);
  if(rk.size>1){rocks.push(makeRock(rk.x,rk.y,rk.size-1));rocks.push(makeRock(rk.x,rk.y,rk.size-1));}
}

function update(){
  if(keys['arrowleft']||keys['a'])ship.a-=0.07;
  if(keys['arrowright']||keys['d'])ship.a+=0.07;
  ship.thrust=keys['arrowup']||keys['w'];
  if(ship.thrust){ship.vx+=Math.cos(ship.a)*0.18;ship.vy+=Math.sin(ship.a)*0.18;
    if(Math.random()<0.6)particles.push({x:ship.x-Math.cos(ship.a)*12,y:ship.y-Math.sin(ship.a)*12,vx:-Math.cos(ship.a)*2+ (Math.random()-.5),vy:-Math.sin(ship.a)*2+(Math.random()-.5),life:15,col:'#ffae5f'});}
  ship.vx*=0.99;ship.vy*=0.99;ship.x+=ship.vx;ship.y+=ship.vy;wrap(ship);
  if(ship.cool>0)ship.cool--;if(invuln>0)invuln--;
  if(ship.powerT>0){ship.powerT--;if(ship.powerT===0)ship.power=null;}
  updateEngine();

  for(const b of bullets){b.x+=b.vx;b.y+=b.vy;b.life--;wrap(b);}
  bullets=bullets.filter(b=>b.life>0);

  for(const rk of rocks){rk.x+=rk.vx;rk.y+=rk.vy;rk.rot+=rk.vr;wrap(rk);}

  // bullet-rock
  for(const b of bullets){
    for(let i=0;i<rocks.length;i++){
      if(Math.hypot(b.x-rocks[i].x,b.y-rocks[i].y)<rocks[i].r){
        splitRock(rocks[i]);rocks.splice(i,1);b.life=0;break;
      }
    }
    if(ufo&&Math.hypot(b.x-ufo.x,b.y-ufo.y)<(ufo.small?12:18)){score+=ufo.pts;scoreEl.textContent=score;popText(ufo.x,ufo.y,'+'+ufo.pts,'#ff5fd0');boom(ufo.x,ufo.y,'#ff5fd0',16);sfx('ufohit');addShake(5);
      const kinds=['shield','triple','rapid'];powerups.push({x:ufo.x,y:ufo.y,vx:(Math.random()-.5)*0.6,vy:(Math.random()-.5)*0.6,kind:kinds[Math.floor(Math.random()*kinds.length)],rot:0});
      ufo=null;b.life=0;}
  }
  bullets=bullets.filter(b=>b.life>0);

  // ship-rock
  if(invuln<=0)for(const rk of rocks){
    if(Math.hypot(ship.x-rk.x,ship.y-rk.y)<rk.r+ship.r){return hit();}
  }
  // UFO
  ufoT--;
  if(ufoT<=0&&!ufo){const sm=wave>=3&&Math.random()<0.4;ufo={x:Math.random()<.5?-30:W+30,y:Math.random()*H,vx:0,vy:0,cool:60,small:sm,pts:sm?1000:200};ufo.vx=ufo.x<0?(sm?2.3:1.6):(sm?-2.3:-1.6);ufoT=1100+Math.random()*700;sfx('ufo');}
  if(ufo){
    ufo.x+=ufo.vx;ufo.y+=Math.sin(Date.now()/400)*0.8;
    if(ufo.x<-40||ufo.x>W+40)ufo=null;
    else{ufo.cool--;if(ufo.cool<=0){ufo.cool=ufo.small?55:70;const a=Math.atan2(ship.y-ufo.y,ship.x-ufo.x)+(ufo.small?(Math.random()-.5)*0.08:(Math.random()-.5)*0.4);const sp=ufo.small?4.6:4;ufoBullets.push({x:ufo.x,y:ufo.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:120});}}
  }
  for(const b of ufoBullets){b.x+=b.vx;b.y+=b.vy;b.life--;wrap(b);
    if(invuln<=0&&Math.hypot(b.x-ship.x,b.y-ship.y)<ship.r){b.life=0;hit();}}
  ufoBullets=ufoBullets.filter(b=>b.life>0);

  // 파워업 표류/획득
  for(const pu of powerups){ pu.x+=pu.vx;pu.y+=pu.vy;pu.rot+=0.05;wrap(pu);
    if(Math.hypot(pu.x-ship.x,pu.y-ship.y)<ship.r+12){ pu.dead=true; sfx('catch');
      if(pu.kind==='shield')ship.shield=true; else {ship.power=pu.kind;ship.powerT=540;}
      popText(ship.x,ship.y-18,powerName(pu.kind),'#5fffac'); } }
  powerups=powerups.filter(pu=>!pu.dead);
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.life--;}
  particles=particles.filter(p=>p.life>0);
  for(const d of debris){d.x+=d.vx;d.y+=d.vy;d.a+=d.va;d.life--;}
  debris=debris.filter(d=>d.life>0);
  for(const pp of pops){pp.y-=0.5;pp.life--;} pops=pops.filter(pp=>pp.life>0);
  if(shake>0.3)shake*=0.85; else shake=0;
  // 추가 목숨 (3000/7000점)
  if(extraGiven<1&&score>=3000){extraGiven=1;lives++;livesEl.textContent=lives;sfx('extralife');popText(ship.x,ship.y-26,'1UP','#ffd35f');}
  else if(extraGiven<2&&score>=7000){extraGiven=2;lives++;livesEl.textContent=lives;sfx('extralife');popText(ship.x,ship.y-26,'1UP','#ffd35f');}
  if(score>best){best=score;localStorage.setItem('asteroids_best',best);bestEl.textContent=best;}
  if(rocks.length===0){wave++;waveEl.textContent=wave;invuln=60;spawnWave();sfx('wave');}
}
function hit(){
  if(ship.shield){ ship.shield=false; invuln=60; boom(ship.x,ship.y,'#5fd0ff',14); addShake(6); sfx('hyper'); return; }
  lives--;livesEl.textContent=lives; sfx('death'); addShake(13); spawnDebris(); boom(ship.x,ship.y,'#5fffac',24);
  ship.x=W/2;ship.y=H/2;ship.vx=ship.vy=0;ship.a=-Math.PI/2;invuln=120; ship.power=null;ship.powerT=0;
  if(lives<=0)end();
}
function end(){
  state='over'; stopEngine();
  document.getElementById('endStats').innerHTML=t(`점수: <b>${score}</b> · Wave ${wave}<br>최고: ${best}`,`Score: <b>${score}</b> · Wave ${wave}<br>Best: ${best}`);
  document.getElementById('endScreen').classList.remove('hidden');
}

function draw(){
  ctx.fillStyle='#05050c';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,.3)';for(let i=0;i<60;i++)ctx.fillRect((i*137)%W,(i*89)%H,1.3,1.3);
  ctx.save();
  if(shake>0.3)ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
  // rocks
  ctx.strokeStyle='#cde';ctx.lineWidth=2;
  for(const rk of rocks){
    ctx.save();ctx.translate(rk.x,rk.y);ctx.rotate(rk.rot);ctx.beginPath();
    for(let i=0;i<rk.verts.length;i++){const a=i/rk.verts.length*7;const rr=rk.r*rk.verts[i];const px=Math.cos(a)*rr,py=Math.sin(a)*rr;i?ctx.lineTo(px,py):ctx.moveTo(px,py);}
    ctx.closePath();ctx.stroke();ctx.restore();
  }
  // 파워업
  for(const pu of powerups){ const c=pu.kind==='rapid'?'#ffd35f':pu.kind==='triple'?'#5fd0ff':'#5fffac';
    ctx.save();ctx.translate(pu.x,pu.y);ctx.rotate(pu.rot);
    ctx.strokeStyle=c;ctx.lineWidth=2;ctx.strokeRect(-9,-9,18,18);
    ctx.fillStyle=c;ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(pu.kind==='rapid'?'R':pu.kind==='triple'?'3':'S',0,1);ctx.restore(); }
  ctx.textBaseline='alphabetic';
  // bullets
  ctx.fillStyle='#fff';for(const b of bullets){ctx.beginPath();ctx.arc(b.x,b.y,2.5,0,7);ctx.fill();}
  ctx.fillStyle='#ff7bd0';for(const b of ufoBullets){ctx.beginPath();ctx.arc(b.x,b.y,3,0,7);ctx.fill();}
  // ufo (소형은 더 작고 밝음)
  if(ufo){const s=ufo.small?0.62:1;ctx.strokeStyle=ufo.small?'#ff9be0':'#ff5fd0';ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(ufo.x,ufo.y,18*s,7*s,0,0,7);ctx.stroke();
    ctx.beginPath();ctx.ellipse(ufo.x,ufo.y-5*s,9*s,5*s,0,Math.PI,0);ctx.stroke();}
  // particles
  for(const p of particles){ctx.globalAlpha=Math.min(1,p.life/25);ctx.fillStyle=p.col;ctx.fillRect(p.x,p.y,2.5,2.5);}
  ctx.globalAlpha=1;
  // 파괴 파편(선 조각)
  ctx.strokeStyle='#5fffac';ctx.lineWidth=2;
  for(const d of debris){ ctx.globalAlpha=Math.min(1,d.life/50);
    ctx.save();ctx.translate(d.x,d.y);ctx.rotate(d.a);ctx.beginPath();ctx.moveTo(-d.len/2,0);ctx.lineTo(d.len/2,0);ctx.stroke();ctx.restore(); }
  ctx.globalAlpha=1;
  // ship
  if(invuln<=0||Math.floor(invuln/6)%2===0){
    ctx.save();ctx.translate(ship.x,ship.y);ctx.rotate(ship.a);
    ctx.strokeStyle='#5fffac';ctx.lineWidth=2;ctx.beginPath();
    ctx.moveTo(14,0);ctx.lineTo(-10,-9);ctx.lineTo(-5,0);ctx.lineTo(-10,9);ctx.closePath();ctx.stroke();
    if(ship.thrust){ctx.strokeStyle='#ffae5f';ctx.beginPath();ctx.moveTo(-5,0);ctx.lineTo(-14-Math.random()*5,0);ctx.stroke();}
    ctx.restore();
  }
  // 실드 링
  if(ship.shield){ ctx.strokeStyle='rgba(95,208,255,.8)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(ship.x,ship.y,ship.r+7,0,7);ctx.stroke(); }
  // 점수 팝업
  ctx.font='bold 13px sans-serif';ctx.textAlign='center';
  for(const pp of pops){ctx.globalAlpha=Math.min(1,pp.life/50);ctx.fillStyle=pp.col;ctx.fillText(pp.txt,pp.x,pp.y);}
  ctx.globalAlpha=1;
  ctx.restore();
  // 파워업 잔여시간 바
  if(ship.power&&ship.powerT>0){ const w=120,x=W/2-w/2,y=H-12;
    ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(x-2,y-2,w+4,8);
    ctx.fillStyle=ship.power==='rapid'?'#ffd35f':'#5fd0ff';ctx.fillRect(x,y,w*(ship.powerT/540),4);
    ctx.fillStyle='#fff';ctx.font='9px sans-serif';ctx.textAlign='center';ctx.fillText(powerName(ship.power),W/2,y-5); }
}
function loop(){if(state==='play'){update();if(state==='play')draw();}requestAnimationFrame(loop);}
ctx.fillStyle='#05050c';ctx.fillRect(0,0,W,H);
requestAnimationFrame(loop);
</script>
<script src="_controls.js"></script>
<script>
TC.make({
  landscape:true,
  left:[{label:'↺',key:'ArrowLeft'},{label:'🔥',sub:t('추진','Thrust'),key:'ArrowUp',cls:'big'},{label:'↻',key:'ArrowRight'}],
  right:[{label:'●',sub:t('발사','Fire'),key:' ',repeat:true,cls:'big'},{label:'✦',sub:t('워프','Warp'),key:'Shift'}]
});
</script>
</body>
</html>
