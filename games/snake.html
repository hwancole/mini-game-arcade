<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 스네이크</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI','Malgun Gothic',sans-serif;background:#0d1a12;color:#eee;
    display:flex;flex-direction:column;align-items:center;min-height:100vh}
  .topbar{width:100%;max-width:640px;display:flex;justify-content:space-between;align-items:center;padding:10px 16px}
  .topbar a{color:#5fffac;text-decoration:none;font-weight:bold}
  .stats{display:flex;gap:24px;margin:8px;font-size:1.2rem;font-weight:bold}
  #wrap{position:relative}
  canvas{background:#10241a;border:2px solid #2a4a36;border-radius:8px;display:block}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(6,14,10,.93);border-radius:8px;text-align:center;padding:20px;gap:14px}
  .overlay.hidden{display:none}
  .overlay h2{font-size:2rem;color:#5fffac}
  .btn{background:#5fffac;color:#063;border:none;padding:12px 26px;border-radius:8px;font-weight:bold;cursor:pointer;transition:.15s}
  .btn:hover{transform:scale(1.05)}
  .modes{display:flex;gap:10px}
  .mode{padding:8px 16px;border:2px solid #444;border-radius:8px;cursor:pointer}
  .mode.sel{border-color:#5fffac;background:rgba(95,255,172,.15)}
  .hint{color:#9aa;font-size:.85rem;line-height:1.7}
  kbd{background:#222;border:1px solid #444;border-radius:4px;padding:1px 6px}
</style>
<link rel="stylesheet" href="_arcade.css">
<script src="_i18n.js"></script>
</head>
<body>
<div class="topbar"><a href="../index.html">← 메인으로</a><b>🐍 스네이크</b><span></span></div>
<div class="stats"><span>🍎 <span id="score">0</span></span><span>🏆 <span id="best">0</span></span></div>
<div id="wrap">
  <canvas id="cv" width="560" height="560"></canvas>
  <div class="overlay" id="startScreen">
    <h2>스네이크</h2>
    <p class="hint" data-ko="사과를 먹고 몸을 키우세요. 벽이나 자기 몸에 부딪히면 끝!" data-en="Eat apples to grow longer. Hit a wall or yourself and it's over!">사과를 먹고 몸을 키우세요. 벽이나 자기 몸에 부딪히면 끝!</p>
    <div class="modes">
      <div class="mode sel" data-m="wall">벽 모드</div>
      <div class="mode" data-m="wrap">통과 모드</div>
    </div>
    <button class="btn" id="startBtn">시작 ▶</button>
    <p class="hint"><kbd>←↑↓→</kbd> <span data-ko="또는" data-en="or">또는</span> <kbd>WASD</kbd> <span data-ko="이동" data-en="to move">이동</span></p>
  </div>
  <div class="overlay hidden" id="endScreen">
    <h2>게임 오버</h2>
    <p class="hint" id="endStats"></p>
    <button class="btn" id="restartBtn">🔄 재시작</button>
    <a class="btn alt" href="../index.html">🏠 홈으로</a>
  </div>
</div>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const GRID=28,CELL=cv.width/GRID;
let snake,dir,nextDir,food,score,best,state,speed,moveTimer,grow,mode='wall';
const scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
best=parseInt(localStorage.getItem('snake_best')||'0');bestEl.textContent=best;

document.querySelectorAll('.mode').forEach(m=>m.onclick=()=>{
  document.querySelectorAll('.mode').forEach(x=>x.classList.remove('sel'));m.classList.add('sel');mode=m.dataset.m;});

function placeFood(){
  do{food={x:Math.floor(Math.random()*GRID),y:Math.floor(Math.random()*GRID)};}
  while(snake.some(s=>s.x===food.x&&s.y===food.y));
}
function start(){
  snake=[{x:14,y:14},{x:13,y:14},{x:12,y:14}];
  dir={x:1,y:0};nextDir={x:1,y:0};score=0;speed=130;grow=0;moveTimer=0;
  scoreEl.textContent=0;placeFood();state='play';
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.add('hidden');
  last=performance.now();
}
document.getElementById('startBtn').onclick=start;
document.getElementById('restartBtn').onclick=start;

addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();let nd=null;
  if(k==='arrowup'||k==='w')nd={x:0,y:-1};
  else if(k==='arrowdown'||k==='s')nd={x:0,y:1};
  else if(k==='arrowleft'||k==='a')nd={x:-1,y:0};
  else if(k==='arrowright'||k==='d')nd={x:1,y:0};
  if(nd){e.preventDefault();if(nd.x!==-dir.x||nd.y!==-dir.y)nextDir=nd;}
});

function step(){
  dir=nextDir;
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(mode==='wrap'){head.x=(head.x+GRID)%GRID;head.y=(head.y+GRID)%GRID;}
  else if(head.x<0||head.x>=GRID||head.y<0||head.y>=GRID){return gameOver();}
  if(snake.some(s=>s.x===head.x&&s.y===head.y))return gameOver();
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score+=10;scoreEl.textContent=score;grow+=2;placeFood();
    if(speed>60)speed-=2;
  }
  if(grow>0)grow--;else snake.pop();
}
function gameOver(){
  state='over';
  if(score>best){best=score;localStorage.setItem('snake_best',best);bestEl.textContent=best;}
  document.getElementById('endStats').innerHTML=t(`점수: <b>${score}</b> · 길이: ${snake.length}<br>최고: ${best}`,`Score: <b>${score}</b> · Length: ${snake.length}<br>Best: ${best}`);
  document.getElementById('endScreen').classList.remove('hidden');
}

function draw(){
  ctx.fillStyle='#10241a';ctx.fillRect(0,0,cv.width,cv.height);
  // subtle grid
  ctx.strokeStyle='rgba(255,255,255,.03)';
  for(let i=0;i<=GRID;i++){ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,cv.height);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*CELL);ctx.lineTo(cv.width,i*CELL);ctx.stroke();}
  // food
  ctx.fillStyle='#ff5f6d';ctx.beginPath();ctx.arc(food.x*CELL+CELL/2,food.y*CELL+CELL/2,CELL/2-2,0,7);ctx.fill();
  ctx.fillStyle='#5fffac';ctx.fillRect(food.x*CELL+CELL/2-1,food.y*CELL+2,2,4);
  // snake
  for(let i=snake.length-1;i>=0;i--){
    const s=snake[i],t=i/snake.length;
    ctx.fillStyle=i===0?'#9fffd0':`rgb(${40+t*30},${200-t*90},${120-t*40})`;
    roundRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2,5);ctx.fill();
    if(i===0){
      ctx.fillStyle='#0a0';
      const ex=dir.x,ey=dir.y;
      ctx.fillRect(s.x*CELL+CELL/2-4+ex*3-(ey?3:0),s.y*CELL+CELL/2-4+ey*3-(ex?3:0)+(ex?0:0),3,3);
      ctx.fillRect(s.x*CELL+CELL/2+1+ex*3+(ey?3:0),s.y*CELL+CELL/2-4+ey*3,3,3);
    }
  }
}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

let last=0;
function loop(t){
  if(state==='play'){
    moveTimer+=t-last;
    if(moveTimer>=speed){moveTimer=0;step();}
    draw();
  }
  last=t;
  requestAnimationFrame(loop);
}
// idle
ctx.fillStyle='#10241a';ctx.fillRect(0,0,cv.width,cv.height);
requestAnimationFrame(loop);
</script>
<script src="_controls.js"></script>
<script>
TC.make({ dpad:{keys:{up:'ArrowUp',down:'ArrowDown',left:'ArrowLeft',right:'ArrowRight'}} });
// 캔버스 스와이프로도 조작
(function(){let sx,sy;
  cv.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
  cv.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
    if(Math.max(Math.abs(dx),Math.abs(dy))<20)return;
    const k=Math.abs(dx)>Math.abs(dy)?(dx>0?'ArrowRight':'ArrowLeft'):(dy>0?'ArrowDown':'ArrowUp');
    window.dispatchEvent(new KeyboardEvent('keydown',{key:k}));},{passive:true});
})();
</script>
</body>
</html>
