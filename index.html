<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎮 미니 게임 아케이드</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
    background: radial-gradient(circle at 20% 20%, #1a1a3e 0%, #0a0a1a 60%, #000 100%);
    color: #fff; min-height: 100vh; overflow-x: hidden;
  }
  .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .star { position: absolute; width: 2px; height: 2px; background: #fff; border-radius: 50%; opacity: .6; animation: twinkle 3s infinite; }
  @keyframes twinkle { 0%,100%{opacity:.2} 50%{opacity:.9} }

  /* Language switch */
  .lang-switch {
    position: fixed; top: 14px; right: 14px; z-index: 50;
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.2);
    border-radius: 24px; padding: 5px 8px 5px 10px; backdrop-filter: blur(8px);
    box-shadow: 0 4px 16px rgba(0,0,0,.4);
  }
  .lang-switch .globe { font-size: 1.1rem; line-height: 1; }
  .lang-switch .seg { display: flex; background: rgba(0,0,0,.3); border-radius: 18px; overflow: hidden; }
  .lang-switch button {
    border: none; background: transparent; color: #aab; font-weight: 700; cursor: pointer;
    padding: 6px 12px; font-size: .82rem; transition: .15s; white-space: nowrap;
  }
  .lang-switch button.active { background: linear-gradient(90deg,#5f9fff,#c46fff); color: #fff; }

  header { text-align: center; padding: 64px 20px 18px; position: relative; z-index: 1; }
  h1 {
    font-size: clamp(1.8rem, 6vw, 4rem); font-weight: 900;
    background: linear-gradient(90deg, #ff5f6d, #ffc371, #5fffbc, #5f9fff, #c46fff);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    animation: hue 8s linear infinite; letter-spacing: 1px;
  }
  @keyframes hue { from{filter:hue-rotate(0)} to{filter:hue-rotate(360deg)} }
  header p { margin-top: 12px; color: #9aa; font-size: clamp(.9rem,2.6vw,1.05rem); padding: 0 10px; }

  .grid {
    max-width: 1100px; margin: 26px auto 40px; padding: 0 16px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 18px; position: relative; z-index: 1;
  }
  .card {
    display: block; text-decoration: none; color: #fff; position: relative;
    background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.12);
    border-radius: 18px; padding: 22px 20px; overflow: hidden;
    transition: transform .25s, box-shadow .25s, border-color .25s; backdrop-filter: blur(6px);
    -webkit-tap-highlight-color: transparent;
  }
  .card:hover, .card:active { transform: translateY(-6px) scale(1.02); border-color: var(--c); box-shadow: 0 14px 40px -10px var(--c); }
  .card .icon { font-size: 3rem; display: block; margin-bottom: 12px; }
  .card h2 { font-size: 1.3rem; margin-bottom: 8px; }
  .card .desc { color: #9aa; font-size: .9rem; line-height: 1.5; min-height: 2.6em; }
  .card .glow { position: absolute; top:-40%; right:-40%; width: 160px; height: 160px; border-radius:50%; background: var(--c); filter: blur(60px); opacity:.35; }
  .badge { display:inline-block; margin-top:14px; font-size:.7rem; padding:3px 10px; border-radius:20px; background: rgba(255,255,255,.1); border:1px solid var(--c); color: var(--c); }
  .ai-chip { position:absolute; top:12px; right:12px; font-size:.66rem; font-weight:800; padding:3px 8px; border-radius:20px;
    background:linear-gradient(90deg,#5f9fff,#c46fff); color:#fff; box-shadow:0 2px 8px rgba(95,159,255,.5); letter-spacing:.3px; }
  .cat { max-width:1100px; margin:0 auto; padding:0 16px; position:relative; z-index:1; }
  .cat-title { font-size:clamp(1.1rem,3.5vw,1.5rem); font-weight:800; margin:26px 4px 6px; display:flex; align-items:center; gap:8px; }
  .cat-title .ln { flex:1; height:1px; background:linear-gradient(90deg,rgba(255,255,255,.25),transparent); }
  .cat-title .cnt { font-size:.8rem; color:#9aa; font-weight:600; }

  footer { text-align:center; padding: 26px 20px 40px; position:relative; z-index:1; }
  footer .made { font-size: 1.3rem; font-weight: 800; letter-spacing: 1px;
    background: linear-gradient(90deg,#5f9fff,#c46fff,#ff5f6d); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  footer .sub { margin-top: 8px; color:#566; font-size:.82rem; }

  @media (max-width: 480px){
    header { padding-top: 70px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .card { padding: 16px 14px; border-radius: 14px; }
    .card .icon { font-size: 2.3rem; }
    .card h2 { font-size: 1.05rem; }
    .card .desc { font-size: .76rem; min-height: 0; }
  }
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<div class="lang-switch" role="group" aria-label="언어 선택 / Language">
  <span class="globe" aria-hidden="true">🌐</span>
  <div class="seg">
    <button data-lang="ko" class="active">한국어</button>
    <button data-lang="en">English</button>
  </div>
</div>

<header>
  <h1 data-ko="🎮 미니 게임 아케이드" data-en="🎮 Mini Game Arcade">🎮 미니 게임 아케이드</h1>
  <p data-ko="27가지 클래식 게임을 한 곳에서. 버튼을 눌러 바로 플레이하세요!" data-en="27 classic games in one place — tap a card and play instantly!">27가지 클래식 게임을 한 곳에서. 버튼을 눌러 바로 플레이하세요!</p>
</header>

<main>
  <section class="cat">
    <h3 class="cat-title"><span data-ko="👥 2인용 게임" data-en="👥 Two-Player Games"></span><span class="cnt" id="cnt2p"></span><span class="ln"></span></h3>
    <div class="grid" id="grid2p"></div>
  </section>
  <section class="cat">
    <h3 class="cat-title"><span data-ko="🎮 1인용 게임" data-en="🎮 Single-Player Games"></span><span class="cnt" id="cnt1p"></span><span class="ln"></span></h3>
    <div class="grid" id="grid1p"></div>
  </section>
</main>

<footer>
  <div class="made">Made by DH</div>
  <div class="sub" data-ko="키보드 · 마우스 · 터치 모두 지원 · 최고 점수는 이 기기에만 저장됩니다" data-en="Keyboard · mouse · touch supported · High scores are saved only on this device">키보드 · 마우스 · 터치 모두 지원 · 최고 점수는 이 기기에만 저장됩니다</div>
</footer>

function makeCard(g){
  const a = document.createElement('a');
  a.className='card'; a.href='games/'+g.f+'.html'; a.style.setProperty('--c',g.c);
  a.innerHTML = `<span class="glow"></span>${g.ai?'<span class="ai-chip">🤖 AI</span>':''}<span class="icon">${g.i}</span>
    <h2 data-ko="${g.ko[0]}" data-en="${g.en[0]}"></h2>
    <p class="desc" data-ko="${g.ko[1]}" data-en="${g.en[1]}"></p>
    <span class="badge" data-ko="${g.ko[2]}" data-en="${g.en[2]}"></span>`;
  return a;
}
const twoP=GAMES.filter(g=>g.twoP), oneP=GAMES.filter(g=>!g.twoP);
const grid2p=document.getElementById('grid2p'), grid1p=document.getElementById('grid1p');
twoP.forEach(g=>grid2p.appendChild(makeCard(g)));
oneP.forEach(g=>grid1p.appendChild(makeCard(g)));
document.getElementById('cnt2p').textContent='('+twoP.length+')';
document.getElementById('cnt1p').textContent='('+oneP.length+')';

function applyLang(lang){
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-ko]').forEach(el=>{ el.textContent = el.getAttribute('data-'+lang); });
  document.querySelectorAll('.lang-switch button').forEach(b=>b.classList.toggle('active', b.dataset.lang===lang));
  // 카드 링크에 현재 언어를 실어, 게임에서도 즉시 적용 (localStorage 공유 안 돼도 동작)
  document.querySelectorAll('.card').forEach(a=>{ const base=a.getAttribute('href').split('?')[0]; a.setAttribute('href', base+'?lang='+lang); });
  try{ localStorage.setItem('arcade_lang', lang); }catch(e){}
}
document.querySelectorAll('.lang-switch button').forEach(b=>b.onclick=()=>applyLang(b.dataset.lang));
let saved='ko';
try{ const u=new URLSearchParams(location.search).get('lang'); saved=(u==='ko'||u==='en')?u:(localStorage.getItem('arcade_lang')||'ko'); }catch(e){}
applyLang(saved);

// stars
const s=document.getElementById('stars');
for(let i=0;i<70;i++){const d=document.createElement('div');d.className='star';
  d.style.left=Math.random()*100+'%';d.style.top=Math.random()*100+'%';
  d.style.animationDelay=(Math.random()*3)+'s';d.style.transform=`scale(${.5+Math.random()*1.5})`;s.appendChild(d);}
</script>
